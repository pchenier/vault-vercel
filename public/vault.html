<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/chart.min.js"></script>
<script src="/feather.min.js"></script>
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<style>
:root {
  --bg:       #080808;
  --bg2:      #0f0f0f;
  --bg3:      #161616;
  --bg4:      #1e1e1e;
  --bg5:      #262626;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.04);
  --text:     #f4f4f5;
  --text2:    #a1a1aa;
  --text3:    #52525b;
  --text4:    #3f3f46;
  --green:    #4ade80;
  --green-bg: rgba(74,222,128,0.08);
  --green-br: rgba(74,222,128,0.14);
  --red:      #f87171;
  --red-bg:   rgba(248,113,113,0.08);
  --red-br:   rgba(248,113,113,0.14);
  --blue:     #60a5fa;
  --blue-bg:  rgba(96,165,250,0.08);
  --yellow:   #fbbf24;
  --yellow-bg:rgba(251,191,36,0.08);
  --purple:   #a78bfa;
  --r:        12px;
  --r-sm:     8px;
  --r-xs:     6px;
  --sidebar:  228px;
  --topbar:   58px;
  --font:     'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{text-decoration:none;color:inherit}
button{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);height:100vh;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 10px;
  position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto
}
.logo{
  display:flex;align-items:center;gap:9px;
  padding:6px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:14px
}
.logo-mark{
  width:26px;height:26px;background:var(--text);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--bg);letter-spacing:-0.5px;flex-shrink:0
}
.logo-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.nav-group{margin-bottom:22px}
.nav-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text4);padding:0 8px;margin-bottom:3px
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:7px 9px;
  border-radius:var(--r-xs);cursor:pointer;color:var(--text3);
  font-size:13px;font-weight:450;transition:all .12s;user-select:none;
  margin-bottom:1px;border:1px solid transparent
}
.nav-item:hover{background:var(--bg3);color:var(--text2)}
.nav-item.active{background:var(--bg4);color:var(--text);font-weight:500}
.nav-item .ico{width:15px;height:15px;flex-shrink:0;opacity:.55}
.nav-item.active .ico{opacity:.9}
.nav-badge{
  margin-left:auto;background:var(--red-bg);color:var(--red);
  font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;
  border:1px solid var(--red-br)
}
.sidebar-foot{
  margin-top:auto;padding-top:12px;border-top:1px solid var(--border)
}
.user-row{
  display:flex;align-items:center;gap:9px;padding:7px 9px;
  border-radius:var(--r-xs);cursor:pointer;transition:background .12s
}
.user-row:hover{background:var(--bg3)}
.avatar{
  width:27px;height:27px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:600;color:#fff;flex-shrink:0
}
.user-name{font-size:12.5px;font-weight:500;color:var(--text)}
.user-plan{font-size:10.5px;color:var(--text3)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  height:var(--topbar);background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:12px;
  position:sticky;top:0;z-index:50;flex-shrink:0
}
.topbar-title{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.topbar-breadcrumb{font-size:13px;color:var(--text3);margin-left:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.icon-btn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-xs);cursor:pointer;color:var(--text3);
  border:1px solid var(--border);background:transparent;transition:all .12s
}
.icon-btn:hover{background:var(--bg3);color:var(--text2)}
.icon-btn svg{width:14px;height:14px}
.sync-dot{
  width:7px;height:7px;background:var(--green);border-radius:50%;
  box-shadow:0 0 6px var(--green)
}
.content{flex:1;overflow-y:auto;padding:28px 32px;min-height:0}

/* ── METRICS ── */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.metric-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.02em;margin-bottom:8px;text-transform:uppercase}
.metric-val{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.6px;font-variant-numeric:tabular-nums;margin-bottom:5px;line-height:1}
.metric-delta{font-size:11.5px;font-weight:500;display:flex;align-items:center;gap:3px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--text3)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
.card-xs{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}

/* ── SECTION HDR ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:-.1px}
.sec-link{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color .12s}
.sec-link:hover{color:var(--text2)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g2-1{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.g1-2{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}

/* ── TXN LIST ── */
.txn-list{display:flex;flex-direction:column}
.txn{
  display:flex;align-items:center;gap:11px;padding:9px 0;
  border-bottom:1px solid var(--border2);transition:background .1s
}
.txn:last-child{border-bottom:none}
.txn-ico{
  width:32px;height:32px;border-radius:9px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0
}
.txn-info{flex:1;min-width:0}
.txn-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-sub{font-size:11px;color:var(--text3);margin-top:1px}
.txn-right{text-align:right;flex-shrink:0}
.txn-amt{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.txn-amt.debit{color:var(--text)}
.txn-amt.credit{color:var(--green)}
.txn-date{font-size:11px;color:var(--text3)}

/* ── BUDGET ── */
.budget-item{display:flex;flex-direction:column;gap:6px;padding:12px 0;border-bottom:1px solid var(--border2)}
.budget-item:last-child{border-bottom:none}
.budget-row{display:flex;align-items:center;justify-content:space-between}
.budget-cat{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--text)}
.budget-cat-ico{font-size:15px}
.budget-nums{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.pbar{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .3s ease}
.pfill.ok{background:var(--green)}.pfill.warn{background:var(--yellow)}.pfill.over{background:var(--red)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:500}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-br)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-br)}
.b-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,.14)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.14)}
.b-purple{background:rgba(167,139,250,.08);color:var(--purple);border:1px solid rgba(167,139,250,.14)}

/* ── BTNS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .12s;border:none}
.btn svg{width:13px;height:13px}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11.5px}

/* ── ACCOUNT CARD ── */
.acc-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;transition:border-color .15s;cursor:default
}
.acc-card:hover{border-color:rgba(255,255,255,.11)}
.acc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.acc-logo{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0
}
.acc-title{font-size:13px;font-weight:500;color:var(--text)}
.acc-sub{font-size:11px;color:var(--text3)}
.acc-bal{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin-bottom:3px}
.acc-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ── INSIGHT CARD ── */
.insight{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:flex;gap:12px;align-items:flex-start
}
.insight-ico{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px
}
.insight h4{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;letter-spacing:-.1px}
.insight p{font-size:12px;color:var(--text3);line-height:1.6}

/* ── HABIT ── */
.habit-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.habit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.habit-name{font-size:13px;font-weight:500;color:var(--text)}
.habit-streak{font-size:12px;font-weight:600;color:var(--yellow)}
.habit-dots{display:flex;gap:3px;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:2px;transition:transform .1s,opacity .15s}
.dot:hover{transform:scale(1.4);opacity:1!important}
.dot.done{background:var(--green);opacity:.8}
.dot.miss{background:var(--bg5);opacity:.6}
.dot.dot-today{outline:2px solid var(--accent);outline-offset:1px}
.habit-stat{font-size:11px;color:var(--text3);margin-top:6px}

/* ── GYM HEATMAP ── */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.hm-day{aspect-ratio:1;border-radius:3px;background:var(--bg4)}
.hm-day.w{background:var(--green);opacity:.65}
.hm-day.r{background:var(--bg3)}
.hm-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.hm-label{font-size:9.5px;color:var(--text4);text-align:center}

/* ── CRYPTO ── */
.crypto-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border2)}
.crypto-row:last-child{border-bottom:none}
.coin-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

/* ── INVESTMENT ── */
.inv-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.inv-row:last-child{border-bottom:none}
.ticker-box{
  width:34px;height:34px;border-radius:8px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  color:var(--text2);flex-shrink:0
}

/* ── BILL ── */
.bill-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border2)}
.bill-row:last-child{border-bottom:none}
.bill-date-box{width:34px;text-align:center;flex-shrink:0}
.bill-day{font-size:16px;font-weight:600;color:var(--text);line-height:1}
.bill-mo{font-size:9.5px;color:var(--text3);text-transform:uppercase}

/* ── MEAL ── */
.meal-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.meal-row:last-child{border-bottom:none}
.meal-ico{width:30px;height:30px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{
  min-height:64px;border-radius:var(--r-xs);background:var(--bg3);
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;
  padding:5px 6px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:background .12s;
  position:relative;overflow:hidden
}
.cal-cell:hover{background:var(--bg4)}
.cal-cell.today{background:var(--bg4);color:var(--text);outline:1px solid var(--border)}
.cal-cell.has-event::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cal-cell.empty{background:transparent;cursor:default}
.cal-day-hdr{font-size:10px;font-weight:600;color:var(--text4);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-tpl-pill{padding:5px 10px;border-radius:16px;font-size:11px;font-family:var(--font);cursor:pointer;background:var(--bg4);border:1px solid var(--border);color:var(--text3);transition:all .12s}
.cal-tpl-pill:hover,.cal-tpl-pill.active{background:var(--text);border-color:var(--text);color:var(--bg)}
.cal-ev-chip{display:block;font-size:9.5px;font-weight:600;padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4}
.cal-dot-row{display:flex;gap:2px;flex-wrap:wrap;margin-top:auto;padding-top:2px}

/* ── SETTINGS ── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border2)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.setting-desc{font-size:11.5px;color:var(--text3)}
.toggle{
  width:36px;height:20px;background:var(--bg5);border-radius:10px;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0
}
.toggle.on{background:var(--green);opacity:.8}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:16px;height:16px;background:var(--text);border-radius:50%;
  transition:transform .2s
}
.toggle.on::after{transform:translateX(16px)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-inp{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:7px 12px;color:var(--text);font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .12s;width:200px
}
.search-inp:focus{border-color:rgba(255,255,255,.15)}
.search-inp::placeholder{color:var(--text4)}
.sel{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:7px 10px;color:var(--text2);font-family:var(--font);font-size:12px;outline:none;cursor:pointer
}

/* ── FADE ── */
.fade-in{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DASH GRID ── */
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-items:start}
.dash-widget{position:relative;grid-column:auto}
.dash-widget-full{grid-column:1/-1}
.dash-wobble{animation:wobble 0.5s ease infinite alternate}
@keyframes wobble{0%{transform:rotate(-0.5deg)}100%{transform:rotate(0.5deg)}}
.dash-del-btn{position:absolute;top:-8px;left:-8px;z-index:10;width:22px;height:22px;border-radius:50%;background:#ef4444;border:2px solid var(--bg);color:#fff;font-size:14px;font-weight:700;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.dash-size-btn{position:absolute;top:-8px;right:-8px;z-index:10;width:22px;height:22px;border-radius:50%;background:var(--bg4);border:2px solid var(--border);color:var(--text3);font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.dash-placeholder{border-radius:var(--r)}

/* ── CHART WRAPPERS ── */
.chart-wrap{position:relative;width:100%}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty svg{opacity:.15;margin-bottom:10px}
.empty h3{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:3px}
.empty p{font-size:12px;color:var(--text3)}

/* ── CONN CARD ── */
.connect-card{
  background:var(--bg2);border:1px dashed var(--border);border-radius:var(--r);
  padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;text-align:center
}
.connect-card:hover{border-color:rgba(255,255,255,.14);background:var(--bg3)}
.connect-card span{font-size:13px;color:var(--text3)}

@media(max-width:1180px){
  .metrics-row{grid-template-columns:repeat(2,1fr)}
  .g2-1{grid-template-columns:1fr}.g1-2{grid-template-columns:1fr}
}
@media(max-width:900px){
  .g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}
}
@media(max-width:700px){
  :root{--sidebar:0px}
  .sidebar{display:none}
  .content{padding:20px 16px}
  .topbar{padding:0 16px}
  .metrics-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ══════════════════════ SIDEBAR ══════════════════════ -->
<aside class="sidebar">
  <div class="logo">
    <img src="/logo.svg" alt="Vault" style="height:28px;width:auto">
  </div>

  <nav class="nav-group">
    <div class="nav-label">Overview</div>
    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <svg class="ico" data-feather="home"></svg> Dashboard
    </div>
    <div class="nav-item" data-page="accounts" onclick="navigate('accounts')">
      <svg class="ico" data-feather="credit-card"></svg> Accounts
    </div>

<div class="main">

<script>
// ═══════════════════════════ MOCK DATA ═══════════════════════════
const D = {
  netWorth:0, totalAssets:0, totalDebt:0, income:0, spending:0, cashFlow:0,
  txns:[], accounts:[], bills:[], habits:[], budget:[], investments:[], crypto:[],
  catLabels:[], catAmounts:[], netWorthHistory:[], monthLabels:[], gym:[], gymDays:[], meals:[],
  generated:'',
};

// Categories excluded from spending/budget calculations (declared early — used in pgDashboard)
const EXCLUDED_CATS = new Set(['P2P/Virement perso']);

// ═══════════════════════════ HELPERS ═══════════════════════════
const fmt = (n,decimals=0)=>{
  const abs = Math.abs(n);
  const s = abs.toLocaleString('en-CA',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  return n<0?'-$'+s:'$'+s;
};
const fmtPct = p => (p>=0?'+':'')+p.toFixed(1)+'%';
const deltaClass = d => d>0?'up':d<0?'down':'flat';
const deltaIcon = d => d>0?'▲':d<0?'▼':'–';

Chart.defaults.color='#52525b';
Chart.defaults.font.family="'Inter',sans-serif";
Chart.defaults.font.size=11;

const chartRegistry = {};
function destroyChart(id){if(chartRegistry[id]){chartRegistry[id].destroy();delete chartRegistry[id];}}

// ═══════════════════════════ NAVIGATION ═══════════════════════════
function navigate(page){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
  });
  const now = new Date();
  const nowStr = now.toLocaleString('en',{month:'long',year:'numeric'});
  const titles={dashboard:'Dashboard',accounts:'Accounts',transactions:'Transactions',
    budget:'Budget',insights:'Insights',investments:'Investments',crypto:'Crypto',
    gym:'Gym Tracker',eating:'Eating',habits:'Habits',calendar:'Calendar',settings:'Settings'};
  const subs={dashboard:nowStr,accounts:'6 connected accounts',transactions:'All transactions',
    budget:nowStr,insights:'AI-powered insights',investments:'Portfolio overview',
    crypto:'Crypto holdings',gym:'Workout tracker',eating:'Nutrition',habits:'Daily habits',
    calendar:nowStr,settings:'Account & preferences'};
  document.getElementById('page-title').textContent=titles[page]||'Dashboard';
  document.getElementById('page-sub').textContent=subs[page]||'';
  const c=document.getElementById('content');
  try {
    c.innerHTML='<div class="fade-in">'+renderPage(page)+'</div>';
  } catch(e) {
    c.innerHTML='<div style="padding:2rem;color:#f87171;font-size:13px;font-family:monospace">Error rendering '+page+':<br>'+e.message+'<br><pre style="margin-top:8px;font-size:11px;color:#71717a">'+e.stack+'</pre></div>';
    console.error('renderPage error:', e);
  }
  Object.keys(chartRegistry).forEach(destroyChart);
  requestAnimationFrame(()=>{
    if(page==='dashboard'){ initDashCharts(); if(_dashEditMode) _initDashDrag(); }
    if(page==='savings')initSavingsChart();
    if(page==='investments')initInvCharts();
    if(page==='crypto')initCryptoCharts();
    if(page==='transactions') filterTxns();
    feather.replace({width:14,height:14});
  });
}

function renderPage(p){
  switch(p){
    case 'dashboard':     return pgDashboard();
    case 'accounts':      return pgAccounts();
    case 'transactions':  return pgTransactions();
    case 'budget':        return pgBudget();
    case 'insights':      return pgInsights();
    case 'savings':       return pgSavings();
    case 'subscriptions': return pgSubscriptions();
    case 'investments':   return pgInvestments();
    case 'crypto':        return pgCrypto();
    case 'gym':           return pgGym();
    case 'eating':        return pgEating();
    case 'habits':        return pgHabits();
    case 'calendar':      return pgCalendar();
    case 'settings':      return pgSettings();
    default: return pgDashboard();
  }
}

// ═══════════════════════════ DASHBOARD ═══════════════════════════
const WIDGET_REGISTRY = {
  'metrics':     { label:'Métriques',      desc:'Revenus, dépenses, cash flow', icon:'📊', cols:2 },
  'nw-chart':    { label:'Net Worth',       desc:'Graphique 12 mois',            icon:'📈', cols:1 },
  'cat-chart':   { label:'Catégories',      desc:'Dépenses par catégorie',       icon:'🥧', cols:1 },
  'recent-txns': { label:'Transactions',    desc:'Dernières transactions',       icon:'💳', cols:1 },
  'budget':      { label:'Budget',          desc:'Suivi des limites',            icon:'🎯', cols:1 },
  'bills':       { label:'Factures',        desc:'Prochaines factures',          icon:'📅', cols:1 },
  'accounts':    { label:'Comptes',         desc:'Tous tes comptes',             icon:'🏦', cols:2 },
  'habits':      { label:'Habitudes',       desc:'Streaks et completion',        icon:'✅', cols:1 },
  'cal-events':  { label:'Agenda',          desc:'Prochains événements',         icon:'🗓️', cols:1 },
};
const DASH_LAYOUT_KEY = 'vault_dash_layout';
const DEFAULT_LAYOUT = [
  {id:'metrics',     enabled:true,  cols:2},
  {id:'nw-chart',    enabled:true,  cols:1},
  {id:'cat-chart',   enabled:true,  cols:1},
  {id:'recent-txns', enabled:true,  cols:1},
  {id:'budget',      enabled:true,  cols:1},
  {id:'bills',       enabled:true,  cols:1},
  {id:'habits',      enabled:true,  cols:1},
  {id:'accounts',    enabled:false, cols:2},
  {id:'cal-events',  enabled:false, cols:1},
];
function getDashLayout(){
  try{
    const s=localStorage.getItem(DASH_LAYOUT_KEY);
    if(!s) return DEFAULT_LAYOUT.map(w=>({...w}));
    const l=JSON.parse(s);
    Object.keys(WIDGET_REGISTRY).forEach(id=>{ if(!l.find(w=>w.id===id)) l.push({id,enabled:false,cols:WIDGET_REGISTRY[id].cols}); });
    return l;
  }catch(e){ return DEFAULT_LAYOUT.map(w=>({...w})); }
}
function saveDashLayout(l){ localStorage.setItem(DASH_LAYOUT_KEY, JSON.stringify(l)); }

// ── Widget renderers ──
function _wMetrics(){
  const txns=applyOverrides(applyRules(D.txns)).filter(t=>!EXCLUDED_CATS.has(t.cat));
  const income=txns.filter(t=>t.amt>0).reduce((s,t)=>s+t.amt,0)||D.income;
  const spending=txns.filter(t=>t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0)||D.spending;
  const cashFlow=income-spending;
  return`<div class="metrics-row mb0">
    <div class="metric"><div class="metric-label">Net Worth</div><div class="metric-val">${fmt(D.netWorth,0)}</div><div class="metric-delta up">▲ Tous comptes</div></div>
    <div class="metric"><div class="metric-label">Revenus</div><div class="metric-val">${fmt(income,0)}</div><div class="metric-delta flat">Ce mois</div></div>
    <div class="metric"><div class="metric-label">Dépenses</div><div class="metric-val">${fmt(spending,0)}</div><div class="metric-delta flat">Excl. virements</div></div>
    <div class="metric"><div class="metric-label">Cash Flow</div><div class="metric-val" style="color:${cashFlow>=0?'var(--green)':'var(--red)'}">${fmt(cashFlow,0)}</div><div class="metric-delta ${cashFlow>=0?'up':'down'}">${cashFlow>=0?'▲ Positif':'▼ Négatif'}</div></div>
  </div>`;
}
function _wNwChart(){
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Net Worth</span><span class="badge b-green">12 mois</span></div><div class="chart-wrap" style="height:160px"><canvas id="nwChart"></canvas></div></div>`;
}
function _wCatChart(){
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Catégories</span></div><div class="chart-wrap" style="height:160px"><canvas id="catChart"></canvas></div></div>`;
}
function _wRecentTxns(){
  const rows=applyOverrides(applyRules(D.txns)).slice(0,5).map(t=>{
    const excl=EXCLUDED_CATS.has(t.cat);
    return`<div class="txn" style="${excl?'opacity:.4':''}"><div class="txn-ico">${t.ico||'📂'}</div><div class="txn-info"><div class="txn-name">${t.name}</div><div class="txn-sub">${t.cat} · ${t.acc}</div></div><div class="txn-right"><div class="txn-amt ${t.amt<0?'debit':'credit'}">${fmt(t.amt,2)}</div><div class="txn-date">${t.date}</div></div></div>`;
  }).join('');
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Transactions récentes</span><button class="sec-link" onclick="navigate('transactions')">Voir tout</button></div><div class="txn-list">${rows||'<div style="padding:12px;color:var(--text4);font-size:12px">Aucune</div>'}</div></div>`;
}
function _wBudget(){
  const items=(typeof getBudgetItems==='function'?getBudgetItems().filter(b=>!b.hidden&&(b.lim>0||b.spent>0)).slice(0,5):D.budget.slice(0,5));
  const rows=items.map(b=>{const pct=Math.min((b.spent/b.lim)*100,100);const cls=pct>=100?'over':pct>=85?'warn':'ok';return`<div class="budget-item"><div class="budget-row"><div class="budget-cat"><span class="budget-cat-ico">${b.ico}</span>${b.cat}</div><div class="budget-nums">${fmt(b.spent,0)} <span style="color:var(--text4)">/ ${fmt(b.lim,0)}</span></div></div><div class="pbar"><div class="pfill ${cls}" style="width:${pct}%"></div></div></div>`;}).join('');
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Budget</span><button class="sec-link" onclick="navigate('budget')">Voir tout</button></div>${rows||'<div style="padding:12px;color:var(--text4);font-size:12px">Aucun budget</div>'}</div>`;
}
function _wBills(){
  const rows=D.bills.slice(0,4).map(b=>`<div class="bill-row"><div class="bill-date-box"><div class="bill-day">${b.day}</div><div class="bill-mo">${b.mo}</div></div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">${b.name}</div></div><div style="font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums">${fmt(b.amt,2)}</div></div>`).join('');
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Factures</span><button class="sec-link" onclick="navigate('calendar')">Calendrier</button></div>${rows||'<div style="padding:12px;color:var(--text4);font-size:12px">Aucune facture</div>'}</div>`;
}
function _wAccounts(){
  const rows=D.accounts.slice(0,6).map(a=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2)"><div style="display:flex;align-items:center;gap:10px"><div style="width:30px;height:30px;border-radius:8px;background:${a.color}22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${a.color}">${a.init}</div><div><div style="font-size:12.5px;font-weight:500;color:var(--text)">${a.name}</div><div style="font-size:10.5px;color:var(--text4)">${a.type}</div></div></div><div style="font-size:13px;font-weight:600;color:${a.bal>=0?'var(--text)':'var(--red)'};font-variant-numeric:tabular-nums">${fmt(a.bal,2)}</div></div>`).join('');
  return`<div class="card"><div class="sec-hdr"><span class="sec-title">Comptes</span><button class="sec-link" onclick="navigate('accounts')">Voir tout</button></div>${rows||'<div style="padding:12px;color:var(--text4);font-size:12px">Aucun compte</div>'}</div>`;
}
function _wHabits(){
  const today = new Date();
  const todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const habits = getHabits();
  const doneCount = habits.filter(h=>h.log&&h.log.includes(todayStr)).length;
  const rows = habits.slice(0,4).map(h=>{
    const done = h.log&&h.log.includes(todayStr);
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2)">
      <span style="font-size:13px;color:var(--text)">${h.name}</span>
      <span class="badge ${done?'b-green':'b-gray'}">${done?'✓ done':'pending'}</span>
    </div>`;
  }).join('');
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Habitudes</span><span class="badge b-${doneCount===habits.length&&habits.length>0?'green':'yellow'}">${doneCount}/${habits.length}</span><button class="sec-link" onclick="navigate('habits')">Voir tout</button></div>${rows||'<div style="padding:12px;color:var(--text4);font-size:12px">Aucune habitude</div>'}</div>`;
}
function _wCalEvents(){
  const now=new Date();
  const local=(getCalEvents()||[]).filter(e=>new Date(e.date+'T00:00')>=now).slice(0,3).map(e=>({title:(e.ico||'📅')+' '+e.title,sub:e.date+(e.time?' à '+e.time:''),color:'var(--accent)'}));
  const gcal=(GCAL_EVENTS||[]).filter(e=>new Date(e.start)>=now).slice(0,3).map(e=>({title:e.title,sub:new Date(e.start).toLocaleDateString('fr-CA',{month:'short',day:'numeric'}),color:'#4285f4'}));
  const all=[...local,...gcal].slice(0,5);
  const rows=all.map(e=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)"><div style="width:3px;height:32px;border-radius:2px;background:${e.color};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:12.5px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title}</div><div style="font-size:11px;color:var(--text4)">${e.sub}</div></div></div>`).join('');
  return`<div class="card" style="height:100%"><div class="sec-hdr"><span class="sec-title">Agenda</span><button class="sec-link" onclick="navigate('calendar')">Voir tout</button></div>${rows||'<div style="padding:12px;color:var(--text4);font-size:12px">Aucun événement</div>'}</div>`;
}
function _renderWidget(w){
  const full=w.cols===2;
  let html='';
  switch(w.id){
    case 'metrics':     html=_wMetrics(); break;
    case 'nw-chart':    html=_wNwChart(); break;
    case 'cat-chart':   html=_wCatChart(); break;
    case 'recent-txns': html=_wRecentTxns(); break;
    case 'budget':      html=_wBudget(); break;
    case 'bills':       html=_wBills(); break;
    case 'accounts':    html=_wAccounts(); break;
    case 'habits':      html=_wHabits(); break;
    case 'cal-events':  html=_wCalEvents(); break;
    default: return '';
  }
  return`<div class="dash-widget${full?' dash-widget-full':''}" data-id="${w.id}">${html}</div>`;
}

// ── Edit mode (iPhone-style) ──
let _dashEditMode = false;
let _dashDragSrc = null;

function enterDashEdit(){
  _dashEditMode=true;
  navigate('dashboard');
}
function exitDashEdit(){
  _dashEditMode=false;
  navigate('dashboard');
  showToast('Layout sauvegardé!');
}
function resetDashLayout(){
  saveDashLayout(DEFAULT_LAYOUT.map(w=>({...w})));
  navigate('dashboard');
  showToast('Layout réinitialisé');
}
function removeDashWidget(id){
  const l=getDashLayout();
  const w=l.find(x=>x.id===id);
  if(w) w.enabled=false;
  saveDashLayout(l);
  navigate('dashboard');
}
function addDashWidget(id){
  const l=getDashLayout();
  const w=l.find(x=>x.id===id);
  if(w) w.enabled=true;
  else l.push({id,enabled:true,cols:WIDGET_REGISTRY[id]?.cols||1});
  saveDashLayout(l);
  navigate('dashboard');
}
function toggleDashWidgetSize(id){
  const l=getDashLayout();
  const w=l.find(x=>x.id===id);
  if(w) w.cols=w.cols===2?1:2;
  saveDashLayout(l);
  navigate('dashboard');
}

function _initDashDrag(){
  const grid=document.getElementById('dash-grid');
  if(!grid) return;
  let dragEl=null, placeholder=null;
  grid.querySelectorAll('.dash-widget').forEach(el=>{
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{
      dragEl=el;
      placeholder=document.createElement('div');
      placeholder.className='dash-widget dash-placeholder';
      placeholder.style.cssText=`height:${el.offsetHeight}px;background:var(--bg3);border:2px dashed var(--border);border-radius:var(--r);opacity:.5;${el.classList.contains('dash-widget-full')?'grid-column:1/-1':''}`;
      setTimeout(()=>el.style.opacity='0.3',0);
    });
    el.addEventListener('dragend',()=>{
      el.style.opacity='';
      placeholder?.remove();
      placeholder=null;
      // Save new order
      const ids=[...grid.querySelectorAll('.dash-widget:not(.dash-placeholder)')].map(e=>e.dataset.id);
      const l=getDashLayout();
      const enabled=l.filter(w=>w.enabled);
      const newEnabled=ids.map(id=>enabled.find(w=>w.id===id)).filter(Boolean);
      const disabled=l.filter(w=>!w.enabled);
      saveDashLayout([...newEnabled,...disabled]);
    });
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===el) return;
      const r=el.getBoundingClientRect();
      const mid=r.top+r.height/2;
      if(e.clientY<mid) grid.insertBefore(placeholder,el);
      else grid.insertBefore(placeholder,el.nextSibling);
    });
    el.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===el) return;
      placeholder?.replaceWith(dragEl);
    });
  });
}

function pgDashboard(){
  const layout=getDashLayout();
  const enabled=layout.filter(w=>w.enabled);
  const disabled=layout.filter(w=>!w.enabled);

  const widgets=enabled.map(w=>{
    const inner=_renderWidget(w);
    if(!_dashEditMode) return inner;
    // Edit mode: wobble + X button + resize toggle
    const full=w.cols===2;
    const reg=WIDGET_REGISTRY[w.id];
    return`<div class="dash-widget${full?' dash-widget-full':''} dash-wobble" data-id="${w.id}" draggable="true">
      <button onclick="removeDashWidget('${w.id}')" class="dash-del-btn">×</button>
      <button onclick="toggleDashWidgetSize('${w.id}')" class="dash-size-btn" title="${full?'Réduire':'Agrandir'}">${full?'⊟':'⊞'}</button>
      ${_renderWidget(w).replace(/^<div class="dash-widget[^>]*>/,'<div style="pointer-events:none;opacity:.7">').replace(/<\/div>$/,'</div>')}
    </div>`;
  }).join('');

  const addGrid=_dashEditMode&&disabled.length?`
  <div style="margin-top:20px">
    <div style="font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Ajouter un widget</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${disabled.map(w=>{
        const reg=WIDGET_REGISTRY[w.id];if(!reg)return'';
        return`<button onclick="addDashWidget('${w.id}')" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px">${reg.icon}</div>
          <div style="font-size:10px;font-weight:500;color:var(--text2);text-align:center;line-height:1.3">${reg.label}</div>
          <div style="width:16px;height:16px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:12px;font-weight:700;line-height:1">+</div>
        </button>`;
      }).join('')}
    </div>

// ── Transaction rules (persisted in localStorage) ────────────────────────────
const TXN_RULES_KEY = 'vault_txn_rules';
function getRules(){ try{ return JSON.parse(localStorage.getItem(TXN_RULES_KEY)||'[]'); }catch(e){return[];} }
function saveRules(rules){ localStorage.setItem(TXN_RULES_KEY, JSON.stringify(rules)); }

function applyRules(txns){
  const rules = getRules();
  if(!rules.length) return txns;
  return txns.map(t=>{
    let result = {...t};
    for(const r of rules){
      const field = (result[r.field]||'').toLowerCase();
      const val   = (r.value||'').toLowerCase();
      let match = false;
      if(r.operator==='contains')    match = field.includes(val);
      if(r.operator==='starts_with') match = field.startsWith(val);
      if(r.operator==='equals')      match = field === val;
      if(match){
        result.cat = r.cat;
        result.ico = catIco(r.cat);
      }
    }
    return result;
  });
}

}

function getTxnOverrides(){ try{ return JSON.parse(localStorage.getItem(TXN_OVERRIDES_KEY)||'{}'); }catch(e){return{};} }
function saveTxnOverride(id, patch){ const o=getTxnOverrides(); o[id]=Object.assign(o[id]||{},patch); localStorage.setItem(TXN_OVERRIDES_KEY,JSON.stringify(o)); }
function applyOverrides(txns){ const o=getTxnOverrides(); return txns.map(t=>o[t.id||t.name+t.date]?Object.assign({},t,o[t.id||t.name+t.date]):t); }

function saveTxnEdit(){
  const idx  = parseInt(document.getElementById('te-idx').value);
  const name = document.getElementById('te-name').value.trim();
  const cat  = document.getElementById('te-cat').value;
  const t    = _filteredTxns[idx];
  if(!t) return;
  const id = t.id || t.name+t.date;
  const oldCat = t.cat;

  saveTxnOverride(id, { name, cat, ico: catIco(cat) });
  t.name = name; t.cat = cat; t.ico = catIco(cat);
  const origIdx = D.txns.findIndex(x=>(x.id||x.name+x.date)===id);
  if(origIdx>=0){ D.txns[origIdx].name=name; D.txns[origIdx].cat=cat; D.txns[origIdx].ico=catIco(cat); }
  closeTxnModal();
  renderTxnList(_filteredTxns);

  // If category changed, offer quick rule — wait for modal close animation
  if(cat !== oldCat){
    const tName = t.name;
    setTimeout(()=>{
      const similarCount = D.txns.filter(x => (x.name||'').toLowerCase().includes((tName||'').toLowerCase().slice(0,12))).length;
      if(similarCount > 1){
        showQuickRulePrompt(tName, cat, similarCount);
      }
    }, 200);
  }
}

function filterTxns(q){
  const search = (q||document.querySelector('.search-inp')?.value||'').toLowerCase();
  const cat    = document.getElementById('catFilter')?.value||'';
  const acc    = document.getElementById('accFilter')?.value||'';
  const fromEl = document.getElementById('txn-date-from');
  const toEl   = document.getElementById('txn-date-to');
  const from   = (fromEl?.value || _txnDateFrom) || '';
  const to     = (toEl?.value   || _txnDateTo)   || '';
  // sync vars from inputs
  if(fromEl) _txnDateFrom = fromEl.value;
  if(toEl)   _txnDateTo   = toEl.value;
  let list = applyOverrides(applyRules(D.txns));
  if(search) list = list.filter(t=>(t.name||'').toLowerCase().includes(search)||(t.cat||'').toLowerCase().includes(search)||(t.acc||'').toLowerCase().includes(search));
  if(cat)    list = list.filter(t=>t.cat===cat);
  if(acc)    list = list.filter(t=>t.acc===acc);
  if(from||to){
    list = list.filter(t=>{
      const raw = t.date_iso||'';
      if(!raw) return true;
      if(from && raw < from) return false;
      if(to   && raw > to)   return false;
      return true;
    });
  }
  renderTxnList(list);
}

// ═══════════════════════════ BUDGET ═══════════════════════════
const BUDGET_KEY    = 'vault_budget_limits';
const BUDGET_HIDDEN = 'vault_budget_hidden';
const BUDGET_ORDER  = 'vault_budget_order';

const DEFAULT_LIMITS = {
  'Épicerie':         500,
  'Bouffe/Resto':     300,
  'Gaz':              200,
  'Transport':        150,
  'Shopping':         300,
  'Gym':              100,
  'Santé':            100,
  'Télécom':          100,
  'Divertissement':   150,
  'Abonnements':      100,
  'Logement':        1300,
  'Hydro/Services':   150,
  'Autre':            200,
};

function getBudgetLimits(){
  try{
    const saved = JSON.parse(localStorage.getItem(BUDGET_KEY)||'{}');
    // Merge defaults with saved — saved wins
    return Object.assign({}, DEFAULT_LIMITS, saved);
  }catch(e){return Object.assign({}, DEFAULT_LIMITS);}
}
function saveBudgetLimit(cat, lim){
  const o=getBudgetLimits(); o[cat]=lim; localStorage.setItem(BUDGET_KEY,JSON.stringify(o));
}
function getHidden(){
  try{ return new Set(JSON.parse(localStorage.getItem(BUDGET_HIDDEN)||'[]')); }catch(e){return new Set();}
}
function toggleHidden(cat){
  const h=getHidden();
  h.has(cat)?h.delete(cat):h.add(cat);
  localStorage.setItem(BUDGET_HIDDEN,JSON.stringify([...h]));
}
function getBudgetOrder(){
  try{ const o=JSON.parse(localStorage.getItem(BUDGET_ORDER)||'null'); return o||null; }catch(e){return null;}
}
function saveBudgetOrder(arr){ localStorage.setItem(BUDGET_ORDER,JSON.stringify(arr)); }

function getBudgetItems(){
  const limits   = getBudgetLimits();
  const hidden   = getHidden();
  const order    = getBudgetOrder();
  const txns     = applyOverrides(applyRules(D.txns));
  const now      = new Date();

  // spending per cat this month
  const catSpend = {};
  const nowMonth = now.getMonth();
  const nowYear  = now.getFullYear();
  txns.forEach(t=>{
    if(EXCLUDED_CATS.has(t.cat)) return;
    if(t.amt>=0) return; // income
    const raw = t.date_iso || t.date || '';
    // Parse YYYY-MM-DD safely (avoid UTC offset bug)
    let d;
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
      const [y,m,day] = raw.split('-').map(Number);
      d = new Date(y, m-1, day);
    } else {
      d = new Date(raw);
    }
    if(d.getMonth()===nowMonth && d.getFullYear()===nowYear){
      catSpend[t.cat] = (catSpend[t.cat]||0) + Math.abs(t.amt);
    }
  });

  // Build from ALL_CATS + any cats with spending not in ALL_CATS
  const allCats = [...new Set([...ALL_CATS, ...Object.keys(catSpend)])];
  let items = allCats.map(cat=>({
    cat,
    ico:   catIco(cat),
    spent: Math.round((catSpend[cat]||0)*100)/100,
    lim:   limits[cat] || 0,
    hidden: hidden.has(cat),
  }));

  // Sort by saved order if exists
  if(order){
    const idx = Object.fromEntries(order.map((c,i)=>[c,i]));
    items.sort((a,b)=>(idx[a.cat]??999)-(idx[b.cat]??999));
  }
  return items;
}

  const items  = getBudgetItems();

function toggleHiddenCat(cat, btn){
  toggleHidden(cat);
  const row = btn.closest('.budget-edit-row');
  const isNowHidden = getHidden().has(cat);
  row.style.opacity = isNowHidden?'.4':'1';

// ── Drag to reorder ──────────────────────────────────────────────────────────
let _dragCat = null;
function initBudgetDrag(){
  const list = document.getElementById('budget-edit-list');
  if(!list) return;
  list.addEventListener('dragover', e=>{
    e.preventDefault();
    const target = e.target.closest('.budget-edit-row');
    if(target && target.dataset.cat !== _dragCat){
      const rows = [...list.querySelectorAll('.budget-edit-row')];
      const dragging = list.querySelector(`[data-cat="${_dragCat}"]`);
      const idx = rows.indexOf(target);
      const dragIdx = rows.indexOf(dragging);
      if(idx > dragIdx) target.after(dragging);
      else target.before(dragging);
    }
  });
  list.addEventListener('dragend', ()=>{
    const order = [...list.querySelectorAll('.budget-edit-row')].map(r=>r.dataset.cat);
    saveBudgetOrder(order);
    _dragCat = null;
  });
}
function budgetDragStart(e, cat){
  _dragCat = cat;
  const row = e.target.closest('.budget-edit-row');
  if(row) row.draggable = true;
  setTimeout(()=>{ if(row) row.draggable=true; },0);
}

// ═══════════════════════════ SAVINGS RATE ═══════════════════════════
function pgSavings(){
  const allTxns = applyOverrides(applyRules(D.txns));
  const txns = allTxns.filter(t => !EXCLUDED_CATS.has(t.cat));

  // Build last 12 months of data from transactions
  const now = new Date();
  const months = [];
  for(let i=11; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleString('en-CA',{month:'short'})+' '+d.getFullYear().toString().slice(2) });
  }

  const mData = months.map(m=>{
    const inc = txns.filter(t=>{
      if(t.amt<=0) return false;
      const raw=t.date_iso||t.date||'';
      let d;
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const [y,mo,dy]=raw.split('-').map(Number);d=new Date(y,mo-1,dy);}else{d=new Date(raw);}
      return d.getMonth()===m.month && d.getFullYear()===m.year;
    }).reduce((s,t)=>s+t.amt,0);
    const exp = txns.filter(t=>{
      if(t.amt>=0) return false;
      const raw=t.date_iso||t.date||'';
      let d;
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const [y,mo,dy]=raw.split('-').map(Number);d=new Date(y,mo-1,dy);}else{d=new Date(raw);}
      return d.getMonth()===m.month && d.getFullYear()===m.year;
    }).reduce((s,t)=>s+Math.abs(t.amt),0);
    const cf = inc - exp;
    const rate = inc>0 ? (cf/inc)*100 : 0;
    return { ...m, inc, exp, cf, rate };
  });

  // Current month (last entry)
  const cur = mData[mData.length-1];
  const avg12 = mData.filter(m=>m.inc>0).reduce((s,m)=>s+m.rate,0) / Math.max(1, mData.filter(m=>m.inc>0).length);
  const best = mData.reduce((b,m)=>m.rate>b.rate?m:b, mData[0]);
  const rateColor = cur.rate>=20?'var(--green)':cur.rate>=10?'#fbbf24':'var(--red)';

  return`
  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Savings Rate (Ce Mois)</div>
      <div class="metric-val" style="color:${rateColor}">${cur.rate.toFixed(1)}%</div>
      <div class="metric-delta ${cur.rate>=20?'up':cur.rate>=10?'flat':'down'}">${cur.rate>=20?'▲ On track':cur.rate>=10?'→ Acceptable':'▼ Needs work'}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Cashflow Ce Mois</div>
      <div class="metric-val" style="color:${cur.cf>=0?'var(--green)':'var(--red)'}">${fmt(cur.cf,0)}</div>
      <div class="metric-delta flat">Revenu ${fmt(cur.inc,0)} / Dépenses ${fmt(cur.exp,0)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Moyenne 12 Mois</div>
      <div class="metric-val">${avg12.toFixed(1)}%</div>
      <div class="metric-delta flat">Moy. glissante</div>
    </div>
    <div class="metric">
      <div class="metric-label">Meilleur Mois</div>
      <div class="metric-val" style="color:var(--green)">${best.rate.toFixed(1)}%</div>
      <div class="metric-delta up">${best.label}</div>
    </div>
  </div>

  ${cur.rate<10&&cur.inc>0?`<div class="insight mb20" style="border-color:var(--red-br);background:var(--red-bg)">
    <div class="insight-ico" style="background:var(--red-bg)">🔴</div>
    <div><h4 style="color:var(--red)">Savings rate sous 10% ce mois</h4>
    <p>Tu dépenses ${fmt(cur.exp,0)} sur ${fmt(cur.inc,0)} de revenu. Vise au moins 20% pour construire de la richesse — soit ${fmt(cur.inc*0.2,0)} épargnés ce mois.</p></div>
  </div>`:cur.rate>=20?`<div class="insight mb20" style="border-color:var(--green-br);background:var(--green-bg)">
    <div class="insight-ico" style="background:var(--green-bg)">🟢</div>
    <div><h4 style="color:var(--green)">Excellent — ${cur.rate.toFixed(1)}% d'épargne ce mois</h4>
    <p>Tu épargnes ${fmt(cur.cf,0)} sur ${fmt(cur.inc,0)} de revenu. C'est au-dessus du seuil de 20% recommandé pour la liberté financière.</p></div>
  </div>`:''}

  <div class="card mb20">
    <div class="sec-hdr"><span class="sec-title">Savings Rate — 12 Mois</span></div>
    <div class="chart-wrap" style="height:220px"><canvas id="savingsChart"></canvas></div>
  </div>

  <div class="card">
    <div class="sec-hdr"><span class="sec-title">Détail Mensuel</span></div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="color:var(--text3);border-bottom:1px solid var(--border2)">
            <th style="text-align:left;padding:8px 0;font-weight:500">Mois</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Revenu</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Dépenses</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Cashflow</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Rate</th>
          </tr>
        </thead>

function initSavingsChart(){
  const ctx = document.getElementById('savingsChart')?.getContext('2d');
  if(!ctx) return;
  const allTxns = applyOverrides(applyRules(D.txns));
  const txns = allTxns.filter(t => !EXCLUDED_CATS.has(t.cat));
  const now = new Date();
  const labels=[], rates=[], cashflows=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const inc=txns.filter(t=>{if(t.amt<=0)return false;const raw=t.date_iso||t.date||'';let dd;if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const[y,m,dy]=raw.split('-').map(Number);dd=new Date(y,m-1,dy);}else{dd=new Date(raw);}return dd.getMonth()===d.getMonth()&&dd.getFullYear()===d.getFullYear();}).reduce((s,t)=>s+t.amt,0);
    const exp=txns.filter(t=>{if(t.amt>=0)return false;const raw=t.date_iso||t.date||'';let dd;if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const[y,m,dy]=raw.split('-').map(Number);dd=new Date(y,m-1,dy);}else{dd=new Date(raw);}return dd.getMonth()===d.getMonth()&&dd.getFullYear()===d.getFullYear();}).reduce((s,t)=>s+Math.abs(t.amt),0);
    labels.push(d.toLocaleString('en-CA',{month:'short'}));
    rates.push(inc>0?parseFloat(((inc-exp)/inc*100).toFixed(1)):null);
    cashflows.push(inc>0?Math.round(inc-exp):null);
  }
  const grad=ctx.createLinearGradient(0,0,0,220);
  grad.addColorStop(0,'rgba(74,222,128,0.18)');
  grad.addColorStop(1,'rgba(74,222,128,0)');
  chartRegistry.savings=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      label:'Savings Rate %',data:rates,
      borderColor:'#4ade80',borderWidth:2,backgroundColor:grad,fill:true,
      pointRadius:3,pointHoverRadius:5,tension:0.4,spanGaps:true
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#1e1e1e',borderColor:'rgba(255,255,255,0.07)',borderWidth:1,
        titleColor:'#a1a1aa',bodyColor:'#f4f4f5',padding:10,
        callbacks:{label:ctx=>` ${ctx.parsed.y!==null?ctx.parsed.y.toFixed(1)+'%':'—'}`}
      }},
      scales:{
        x:{grid:{display:false},border:{display:false},ticks:{color:'#52525b',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},border:{display:false},
           ticks:{color:'#52525b',font:{size:10},callback:v=>v+'%'},
           min:0}
      }
    }
  });
}

// ═══════════════════════════ SUBSCRIPTIONS ═══════════════════════════
function pgSubscriptions(){
  const allTxns = applyOverrides(applyRules(D.txns));
  const txns = allTxns.filter(t => !EXCLUDED_CATS.has(t.cat));

  // All Abonnements transactions (current month + last month for "new" detection)
  const now = new Date();
  const curM = now.getMonth(), curY = now.getFullYear();
  const prevM = curM===0?11:curM-1, prevY = curM===0?curY-1:curY;

  function parseDate(t){
    const raw=t.date_iso||t.date||'';
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const[y,m,d]=raw.split('-').map(Number);return new Date(y,m-1,d);}
    return new Date(raw);
  }

  const subs = txns.filter(t=>t.cat==='Abonnements'&&t.amt<0);
  const curSubs  = subs.filter(t=>{ const d=parseDate(t); return d.getMonth()===curM&&d.getFullYear()===curY; });
  const prevSubs = subs.filter(t=>{ const d=parseDate(t); return d.getMonth()===prevM&&d.getFullYear()===prevY; });

  const prevNames = new Set(prevSubs.map(t=>t.name.toLowerCase().trim()));
  const totalCur = curSubs.reduce((s,t)=>s+Math.abs(t.amt),0);
  const totalPrev = prevSubs.reduce((s,t)=>s+Math.abs(t.amt),0);
  const diff = totalCur - totalPrev;

  // Group by service name
  const byName = {};
  curSubs.forEach(t=>{
    const k = t.name.trim();
    if(!byName[k]) byName[k]={ name:k, total:0, count:0, isNew:!prevNames.has(k.toLowerCase()) };
    byName[k].total += Math.abs(t.amt);
    byName[k].count++;
  });
  const services = Object.values(byName).sort((a,b)=>b.total-a.total);

  // Budget for abonnements
  const budgetItems = getBudgetItems();
  const aboBudget = budgetItems.find(b=>b.cat==='Abonnements');
  const aboBudgetLim = aboBudget?.lim||0;

  const noSubs = curSubs.length===0;

  return`
  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Total Ce Mois</div>
      <div class="metric-val">${fmt(totalCur,2)}</div>
      <div class="metric-delta ${diff>0?'down':diff<0?'up':'flat'}">${diff===0?'→ Stable':diff>0?'▲ +'+fmt(Math.abs(diff),2)+' vs mois passé':'▼ '+fmt(Math.abs(diff),2)+' économisés'}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Nbre d'Abonnements</div>
      <div class="metric-val">${services.length}</div>
      <div class="metric-delta flat">Services actifs</div>
    </div>
    <div class="metric">
      <div class="metric-label">Mois Passé</div>
      <div class="metric-val">${fmt(totalPrev,2)}</div>
      <div class="metric-delta flat">Référence</div>
    </div>
    <div class="metric">
      <div class="metric-label">Budget Abos</div>
      <div class="metric-val" style="color:${aboBudgetLim>0&&totalCur>aboBudgetLim?'var(--red)':'var(--text)'}">${aboBudgetLim>0?fmt(aboBudgetLim,0):'Non défini'}</div>
      <div class="metric-delta ${aboBudgetLim>0?totalCur>aboBudgetLim?'down':'up':'flat'}">${aboBudgetLim>0?totalCur>aboBudgetLim?'Dépassé':'Sous budget':'—'}</div>
    </div>
  </div>

  ${services.filter(s=>s.isNew).length>0?`<div class="insight mb20" style="border-color:var(--yellow-br);background:var(--yellow-bg)">
    <div class="insight-ico" style="background:var(--yellow-bg)">🆕</div>
    <div><h4 style="color:#fbbf24">${services.filter(s=>s.isNew).length} nouvel abonnement${services.filter(s=>s.isNew).length>1?'s':''} ce mois</h4>
    <p>${services.filter(s=>s.isNew).map(s=>s.name+' ('+fmt(s.total,2)+')').join(', ')} — absent du mois précédent.</p></div>
  </div>`:''}

  <div class="card">
    <div class="sec-hdr"><span class="sec-title">Détail par Service</span></div>
    ${noSubs?`<div style="padding:32px 0;text-align:center;color:var(--text3);font-size:13px">Aucun abonnement catégorisé ce mois.<br>Assigne la catégorie "Abonnements" à tes transactions récurrentes.</div>`:`
    <div>
      ${services.map(s=>{
        const pct = totalCur>0?(s.total/totalCur*100):0;
        return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2)">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
              <span style="font-size:13px;color:var(--text);font-weight:500">${s.name}</span>
              ${s.isNew?`<span class="badge b-yellow">Nouveau</span>`:''}
              ${s.count>1?`<span class="badge b-gray">${s.count}x</span>`:''}
            </div>
            <div class="pbar" style="height:3px"><div class="pfill ok" style="width:${pct.toFixed(1)}%"></div></div>
          </div>
          <div style="font-size:14px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums">${fmt(s.total,2)}</div>
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;padding:12px 0 0;font-size:13px">
        <span style="color:var(--text3)">Total mensuel</span>
        <span style="font-weight:600;color:var(--text)">${fmt(totalCur,2)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px">
        <span style="color:var(--text3)">Annualisé</span>
        <span style="color:var(--text3)">${fmt(totalCur*12,0)}/an</span>
      </div>
    </div>`}
  </div>`;
}

function renderMiniCal(containerId, hiddenId, selectedISO){
  const el = document.getElementById(containerId);
  if(!el) return;
  const sel  = selectedISO ? new Date(selectedISO+'T00:00') : new Date();
  const today= new Date().toISOString().slice(0,10);
  const year = sel.getFullYear(), month = sel.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay    = (new Date(year, month, 1).getDay()+6)%7; // Mon-start

  const moName = sel.toLocaleString('en',{month:'long'});
  const dayH   = ['M','T','W','T','F','S','S'].map(d=>`<div style="font-size:9.5px;text-align:center;color:var(--text4);font-weight:600">${d}</div>`).join('');

  let cells = '<div style="opacity:0"></div>'.repeat(firstDay);
  for(let d=1;d<=daysInMonth;d++){
    const iso  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel = iso === (document.getElementById(hiddenId)?.value||selectedISO);
    const isTod = iso === today;
    cells += `<div onclick="pickCalDay('${iso}','${hiddenId}','${containerId}')"
      style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;
      border-radius:4px;font-size:10px;font-weight:${isSel?'600':'400'};cursor:pointer;
      background:${isSel?'var(--text)':'isTod'?'var(--bg4)':'transparent'};
      color:${isSel?'var(--bg)':isTod?'var(--text)':'var(--text2)'};
      outline:${isTod&&!isSel?'1px solid var(--border)':'none'};
      transition:background .1s" onmouseover="this.style.background=this.style.background||'var(--bg4)'" onmouseout="if(!this.classList.contains('sel'))this.style.background='${isSel?'var(--text)':'transparent'}'">
      ${d}</div>`;
  }

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <button onclick="shiftMiniCal('${containerId}','${hiddenId}',-1)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:1px 6px">‹</button>
      <span style="font-size:11px;font-weight:500;color:var(--text2)">${moName} ${year}</span>
      <button onclick="shiftMiniCal('${containerId}','${hiddenId}',1)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:1px 6px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">${dayH}${cells}</div>`;
}

function pickCalDay(iso, hiddenId, containerId){
  document.getElementById(hiddenId).value = iso;
  // re-render to show selected
  const d = new Date(iso+'T00:00');
  renderMiniCal(containerId, hiddenId, iso);
}

function shiftMiniCal(containerId, hiddenId, delta){
  // find current month from the header text or hidden value
  const cur = document.getElementById(hiddenId)?.value || new Date().toISOString().slice(0,10);
  const d   = new Date(cur+'T00:00');
  d.setMonth(d.getMonth()+delta);
  // keep same day if possible
  const newISO = d.toISOString().slice(0,10);
  renderMiniCal(containerId, hiddenId, newISO);
}

let _wmType=null, _wmDur=null, _wmExs=new Set();

function _wmRenderTypes(){
  const g=document.getElementById('wm-type-grid'); if(!g)return;
  g.innerHTML=Object.entries(WK_TPLS).map(([name,tpl])=>
    `<button class="wk-type-card" data-type="${name}" onclick="wmPickType('${name}')"
      style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text3);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .12s">
      <span style="font-size:22px">${tpl.emoji}</span><span>${name}</span></button>`).join('');
}
function wmPickType(type){
  _wmType=type; _wmExs=new Set(WK_TPLS[type].exs);
  document.querySelectorAll('.wk-type-card').forEach(c=>{
    const s=c.dataset.type===type;
    c.style.background=s?'var(--accent)':'var(--bg3)';
    c.style.color=s?'var(--bg)':'var(--text3)';
    c.style.borderColor=s?'var(--accent)':'var(--border)';
  });
  const pills=document.getElementById('wm-ex-pills');
  pills.innerHTML=WK_TPLS[type].exs.map(ex=>
    `<button class="wm-ex-pill active" data-ex="${ex}" onclick="wmToggleEx(this)"
      style="padding:4px 10px;border-radius:16px;font-size:11px;font-family:var(--font);cursor:pointer;background:var(--bg4);border:1px solid var(--accent);color:var(--accent);transition:all .12s">${ex}</button>`).join('');
  document.getElementById('wm-ex-sec').style.display='block';
  wmPickDur(WK_TPLS[type].dur);
}
function wmToggleEx(btn){
  const ex=btn.dataset.ex;
  if(_wmExs.has(ex)){
    _wmExs.delete(ex);
    btn.style.borderColor='var(--border)'; btn.style.color='var(--text4)'; btn.style.textDecoration='line-through';
  } else {
    _wmExs.add(ex);
    btn.style.borderColor='var(--accent)'; btn.style.color='var(--accent)'; btn.style.textDecoration='none';
  }
}
function wmAddCustomEx(){
  const inp=document.getElementById('wm-ex-add');
  const val=(inp.value||'').trim(); if(!val) return;
  _wmExs.add(val);
  const pills=document.getElementById('wm-ex-pills');
  const btn=document.createElement('button');
  btn.className='wm-ex-pill active'; btn.dataset.ex=val;
  btn.onclick=function(){wmToggleEx(this);};
  btn.style.cssText='padding:4px 10px;border-radius:16px;font-size:11px;font-family:var(--font);cursor:pointer;background:var(--bg4);border:1px solid var(--accent);color:var(--accent);transition:all .12s';
  btn.textContent=val;

  inp.value='';
}

function pgGym(){
  const logs    = getGymLogs();
  const now     = new Date();
  const thisMo  = logs.filter(l=>{ const d=new Date(l.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const sessions = thisMo.length;

  // build 30-day heatmap
  const heatDays = [];
  for(let i=29;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    heatDays.push(logs.some(l=>l.date===iso));
  }
  const heatmap  = heatDays.map(w=>`<div class="hm-day ${w?'w':'r'}"></div>`).join('');
  const dayLabels= ['M','T','W','T','F','S','S'].map(d=>`<div class="hm-label">${d}</div>`).join('');

  // streak
  let streak=0;
  for(let i=0;i<30;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    if(logs.some(l=>l.date===d.toISOString().slice(0,10))) streak++;
    else break;
  }

  const logRows = logs.slice(0,10).map(l=>`
    <div class="txn" style="padding:10px 0">
      <div class="txn-ico">${WK_TPLS[l.workout]?.emoji||'🏋️'}</div>

        <div class="txn-name">${l.workout}</div>
        <div class="txn-sub">${l.date}${l.duration?' · '+l.duration:''}${l.exercises?.length?' · '+l.exercises.join(', '):''}</div>
      </div>
      <div class="txn-right" style="display:flex;align-items:center;gap:8px">
        ${l.duration?`<div style="font-size:13px;font-weight:500;color:var(--text)">${l.duration}</div>`:''}
        <button onclick="deleteWorkout('${l.id}')" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:15px;padding:2px 4px" title="Delete">×</button>
      </div>
    </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No workouts logged yet</div>';

  return`
  <!-- Workout modal -->
  <div id="workout-modal" style="display:none;opacity:0;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:flex-end;justify-content:center;transition:opacity .15s">

        <button onclick="closeWorkoutModal()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1">×</button>
      </div>

      <div style="display:grid;grid-template-columns:auto 1fr;align-items:center;gap:10px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Date</div>
        <input id="wm-date" type="date" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;color-scheme:dark">

      <div id="wm-type-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px"></div>

      <div id="wm-ex-sec" style="display:none">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Exercises <span style="font-size:10px;color:var(--text4)">(toggle off)</span></div>
        <div id="wm-ex-pills" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px"></div>
        <div style="display:flex;gap:5px;margin-bottom:12px">
          <input id="wm-ex-add" type="text" placeholder="Add exercise..." onkeydown="if(event.key==='Enter'){wmAddCustomEx();event.preventDefault();}"

      <button onclick="saveWorkout()" class="btn btn-primary" style="width:100%;padding:11px;font-size:14px">Save Workout</button>
    </div>
  </div>

  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">This Month</div>
      <div class="metric-val">${sessions} sessions</div>
    </div>
    <div class="metric">
      <div class="metric-label">Current Streak</div>
      <div class="metric-val" style="color:var(--yellow)">${streak} days</div>

      <div class="metric-label">Total Logged</div>
      <div class="metric-val">${logs.length}</div>

      <div class="metric-label">Avg / week</div>
      <div class="metric-val">${logs.length>0?(sessions/4.3).toFixed(1):0}</div>

  </div>
  <div class="g2 mb16">
    <div class="card">
      <div class="sec-hdr"><span class="sec-title">30-Day Activity</span></div>
      <div class="hm-labels">${dayLabels}</div>
      <div class="heatmap">${heatmap}</div>
    </div>
    <div class="card">
      <div class="sec-hdr">
        <span class="sec-title">Workouts</span>
        <button class="btn btn-primary btn-sm" onclick="openWorkoutModal()"><svg data-feather="plus"></svg> Log workout</button>
      </div>
      <div class="txn-list">${logRows}</div>
    </div>
  </div>`;

const EATING_GOALS_KEY = 'vault_eating_goals';
function getEatingGoals(){ try{ return JSON.parse(localStorage.getItem(EATING_GOALS_KEY)||'{}'); }catch(e){return{};} }
function saveEatingGoals(g){ localStorage.setItem(EATING_GOALS_KEY, JSON.stringify(g)); }
function editEatingGoal(field, label){
  const goals = getEatingGoals();
  const cur = goals[field] || (field==='cal'?2400:140);
  const val = prompt(`${label}:`, cur);
  if(val===null) return;
  const n = parseInt(val);
  if(!isNaN(n) && n>0){ goals[field]=n; saveEatingGoals(goals); navigate('eating'); }
}

const HABITS_KEY = 'vault_habits';
function getHabits(){ try{ return JSON.parse(localStorage.getItem(HABITS_KEY)||'[]'); }catch(e){return[];} }
function saveHabits(h){ localStorage.setItem(HABITS_KEY, JSON.stringify(h)); }

function openHabitModal(){
  document.getElementById('hm-name').value='';
  document.getElementById('hm-freq').value='daily';

  m.style.display='flex'; setTimeout(()=>m.style.opacity='1',10);
}
function closeHabitModal(){
  const m=document.getElementById('habit-modal');
  m.style.opacity='0'; setTimeout(()=>m.style.display='none',150);
}
function saveHabit(){
  const name = document.getElementById('hm-name').value.trim();
  const freq = document.getElementById('hm-freq').value;
  if(!name) return;
  const habits = getHabits();
  habits.push({ id: Date.now()+'', name, freq, log: [] });
  saveHabits(habits);
  closeHabitModal();
  setTimeout(()=>navigate('habits'),160);
}
function deleteHabit(id){
  saveHabits(getHabits().filter(h=>h.id!==id));
  navigate('habits');
}
function toggleHabitDay(id, dateStr){
  const d = new Date();
  const fallback = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const target = dateStr || fallback;
  const habits = getHabits();
  const h = habits.find(x=>x.id===id);
  if(!h) return;
  const idx = h.log.indexOf(target);
  if(idx>=0) h.log.splice(idx,1);
  else h.log.push(target);
  saveHabits(habits);
  navigate('habits');
}

function pgHabits(){
  const habits = getHabits();
  const _td = new Date();
  const today = _td.getFullYear()+'-'+String(_td.getMonth()+1).padStart(2,'0')+'-'+String(_td.getDate()).padStart(2,'0');

  // calc streak for a habit
  function calcStreak(log){
    let s=0;
    for(let i=0;i<60;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(log.includes(ds)) s++;
      else break;
    }
    return s;
  }

  // overall 30-day rate
  const last30 = Array.from({length:30},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); });
  const totalPossible = habits.length * 30;
  const totalDone = habits.reduce((s,h)=>s+last30.filter(d=>h.log.includes(d)).length,0);
  const overallRate = totalPossible>0?Math.round(totalDone/totalPossible*100):0;

  const cards = habits.map(h=>{
    const streak = calcStreak(h.log);
    const doneToday = h.log.includes(today);
    const dots = last30.map(d=>{
      const done = h.log.includes(d);
      const isToday = d === today;
      // Format date for tooltip: Jun 10
      const [y,mo,dy] = d.split('-');
      const label = new Date(+y,+mo-1,+dy).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
      return`<div class="dot ${done?'done':'miss'}${isToday?' dot-today':''}" title="${label}${done?' ✓':''}" onclick="toggleHabitDay('${h.id}','${d}')" style="cursor:pointer"></div>`;
    }).join('');
    const rate = Math.round(last30.filter(d=>h.log.includes(d)).length/30*100);
    return`<div class="habit-card">
      <div class="habit-hdr">
        <span class="habit-name">${h.name}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="habit-streak">🔥 ${streak}d</span>
          <button onclick="deleteHabit('${h.id}')" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;line-height:1" title="Delete">×</button>
        </div>
      </div>
      <div class="habit-dots">${dots}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span class="habit-stat">${rate}% this month</span>
        <button onclick="toggleHabitDay('${h.id}')" class="btn btn-sm ${doneToday?'btn-primary':'btn-ghost'}" style="font-size:11px;padding:4px 10px">
          ${doneToday?'✓ Done today':'Mark done'}
        </button>
      </div>
    </div>`;
  }).join('') || '<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--text3);font-size:13px">No habits yet. Add your first habit above.</div>';

  return`
  <!-- Habit modal -->
  <div id="habit-modal" style="display:none;opacity:0;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;transition:opacity .15s">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:360px;max-width:95vw">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <span style="font-size:14px;font-weight:600;color:var(--text)">Add Habit</span>
        <button onclick="closeHabitModal()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px">×</button>
      </div>
      <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Habit Name</label>
      <input id="hm-name" type="text" placeholder="e.g. Morning workout" onkeydown="if(event.key==='Enter')saveHabit()"
        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin-bottom:14px">
      <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Frequency</label>
      <select id="hm-freq" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none">
        <option value="daily">Daily</option>
        <option value="weekdays">Weekdays only</option>
        <option value="weekly">Weekly</option>
      </select>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button onclick="closeHabitModal()" class="btn btn-ghost">Cancel</button>
        <button onclick="saveHabit()" class="btn btn-primary">Add Habit</button>
      </div>
    </div>
  </div>

  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Overall Rate</div>
      <div class="metric-val">${overallRate}%</div>
      <div class="metric-delta up">Last 30 days</div>
    </div>
    <div class="metric">
      <div class="metric-label">Active Habits</div>
      <div class="metric-val">${habits.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Done Today</div>
      <div class="metric-val" style="color:var(--green)">${habits.filter(h=>h.log.includes(today)).length} / ${habits.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Best Streak</div>
      <div class="metric-val" style="color:var(--yellow)">${habits.length?Math.max(...habits.map(h=>calcStreak(h.log))):0}d</div>
    </div>
  </div>
  <div class="sec-hdr mb14">
    <span class="sec-title">Daily Habits</span>
    <button class="btn btn-primary btn-sm" onclick="openHabitModal()"><svg data-feather="plus"></svg> Add habit</button>
  </div>
  <div class="g2">${cards}</div>`;
}

const CAL_EVENTS_KEY = 'vault_cal_events';
function getCalEvents(){ try{ return JSON.parse(localStorage.getItem(CAL_EVENTS_KEY)||'[]'); }catch(e){return[];} }
function saveCalEvents(e){ localStorage.setItem(CAL_EVENTS_KEY, JSON.stringify(e)); }

let _calYear = new Date().getFullYear();
let _calMonth = new Date().getMonth();
let _calSelDay = null;

function _calDayTotals(year, month){
  // returns { day: { income, spending } }
  const totals={};
  applyOverrides(applyRules(D.txns)).forEach(t=>{
    const raw=t.date_iso||'';
    if(!raw) return;
    const d=new Date(raw+'T00:00');
    if(d.getMonth()!==month||d.getFullYear()!==year) return;
    const day=d.getDate();
    if(!totals[day]) totals[day]={income:0,spending:0};
    if(t.amt>0) totals[day].income+=t.amt;
    else totals[day].spending+=Math.abs(t.amt);
  });
  return totals;
}

function _calBuildDayPanel(day, year, month){
  if(!day) return '<div style="padding:24px;text-align:center;color:var(--text4);font-size:12px">Clique un jour</div>';
  const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const dayTxns=applyOverrides(applyRules(D.txns)).filter(t=>(t.date_iso||'')===iso);

  const income=dayTxns.filter(t=>t.amt>0).reduce((s,t)=>s+t.amt,0);
  const spending=dayTxns.filter(t=>t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0);
  const gevs=gcalEventsForDay(iso);
  const levs=getCalEvents().filter(e=>e.date===iso);

    </div>`).join(''):'';
  const gcalHtml=gevs.length?`
    <div style="margin-bottom:12px">
      ${gevs.map(e=>{
        const time=e.allDay?'All day':new Date(e.start).toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
        return`<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)">
          <div style="width:3px;min-height:28px;border-radius:2px;background:#4285f4;flex-shrink:0;margin-top:2px"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12.5px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title}</div>
            <div style="font-size:11px;color:var(--text4);margin-top:1px">${time}${e.location?' · '+e.location:''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:'';
  const rows=dayTxns.map(t=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2)">
      <div style="flex:1;min-width:0">

    </div>`).join('');
  return `
    ${localHtml}
    ${gcalHtml}
    ${dayTxns.length?`<div style="display:flex;justify-content:space-between;padding:0 0 12px;margin-bottom:4px;border-bottom:1px solid var(--border)">

      <span style="font-size:11px;color:var(--red);font-weight:500">-${fmt(spending,2)}</span>
