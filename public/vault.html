// ═══════════════════════════ SETTINGS SAVE ═══════════════════════════
async function saveSettings(e) {
  e.preventDefault();
  const username = document.getElementById('s-username')?.value?.trim();
  const newPwd   = document.getElementById('s-newpwd')?.value;
  const curPwd   = document.getElementById('s-curpwd')?.value;
  const btn      = document.getElementById('settings-save-btn');
  const saving   = document.getElementById('settings-saving');
  const toast    = document.getElementById('settings-toast');

  if (!curPwd) { showSettingsToast('Current password is required.', false); return; }
  if (!username && !newPwd) { showSettingsToast('Nothing to update — fill in a new username or password.', false); return; }
  if (newPwd && newPwd.length < 8) { showSettingsToast('New password must be at least 8 characters.', false); return; }

  if (btn) btn.disabled = true;
  if (saving) saving.style.display = 'inline';

  try {
    const res = await fetch('/api/settings/update', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ currentPassword: curPwd, newUsername: username || null, newPassword: newPwd || null })
    });
    const d = await res.json();
    if (d.ok) {
      showSettingsToast('✓ ' + d.message, true);
      document.getElementById('s-username').value = '';
      document.getElementById('s-newpwd').value = '';
      document.getElementById('s-curpwd').value = '';
    } else {
      showSettingsToast('Error: ' + (d.error || 'Unknown error'), false);
    }
  } catch(err) {
    showSettingsToast('Network error: ' + err.message, false);
  } finally {
    if (btn) btn.disabled = false;
    if (saving) saving.style.display = 'none';
  }
}

function showSettingsToast(msg, ok) {
  const t = document.getElementById('settings-toast');
  if (!t) return;
  t.textContent = msg;
  t.style.background = ok ? 'rgba(74,222,128,0.12)' : 'rgba(248,113,113,0.12)';
  t.style.border = ok ? '1px solid rgba(74,222,128,0.3)' : '1px solid rgba(248,113,113,0.3)';
  t.style.color = ok ? '#4ade80' : '#f87171';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, ok ? 6000 : 4000);
}

// ═══════════════════════════ REFRESH ═══════════════════════════
function doRefresh(){
  const btn=document.getElementById('refresh-btn');
  const dot=document.getElementById('sync-dot');
  if(btn) btn.style.opacity='.4';
  if(dot) dot.style.background='var(--yellow)';
  fetch('/api/refresh',{method:'POST'})
    .then(r=>r.json())
    .then(()=>{
      pollRefresh();
    })
    .catch(()=>{
      if(btn) btn.style.opacity='';
      if(dot) dot.style.background='var(--green)';
    });
}

function pollRefresh(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    if(d.status==='ready'){
      window.location.reload();
    } else if(d.status==='error'){
      const dot=document.getElementById('sync-dot');
      if(dot) dot.style.background='var(--red)';
    } else {
      const ts=document.getElementById('sync-ts');
      if(ts) ts.textContent=d.msg||'Syncing...';
      setTimeout(pollRefresh,1500);
    }
  }).catch(()=>setTimeout(pollRefresh,2000));
}

const NOTIF_KEY   = 'vault_notified';   // set of "eventId_YYYY-MM-DD" already fired
const REMIND_MINS = 15;                 // fire X minutes before the event

function getNotified() {
  try { return new Set(JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]')); }
  catch(e){ return new Set(); }
}
function saveNotified(s) {
  // keep only last 500 to avoid unbounded growth
  const arr = [...s].slice(-500);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(arr));
}

function showToast(title, body, color) {
  let c = document.getElementById('vault-toast-container');
  if (!c) {
    c = document.createElement('div');
    c.id = 'vault-toast-container';
    c.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none';
    document.body.appendChild(c);
  }
  const t = document.createElement('div');
  t.style.cssText = `background:#161616;border:1px solid ${color||'rgba(255,255,255,0.1)'};border-left:3px solid ${color||'#a3e635'};border-radius:10px;padding:14px 18px;min-width:280px;max-width:340px;pointer-events:all;display:flex;flex-direction:column;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:vaultToastIn .2s ease`;
  t.innerHTML = `<div style="font-size:13px;font-weight:600;color:#f4f4f5">${title}</div><div style="font-size:12px;color:#a1a1aa">${body}</div>`;
  const close = document.createElement('button');
  close.innerHTML = '×';
  close.style.cssText = 'position:absolute;top:8px;right:12px;background:none;border:none;color:#52525b;font-size:16px;cursor:pointer;line-height:1';
  t.style.position = 'relative';
  t.appendChild(close);
  close.onclick = () => t.remove();
  c.appendChild(t);
  setTimeout(() => t.remove(), 8000);
}

function checkCalendarNotifications() {
  const events  = JSON.parse(localStorage.getItem('vault_events') || '[]');
  if (!events.length) return;

  const notified = getNotified();
  const now      = new Date();
  let   changed  = false;

  events.forEach(ev => {
    if (!ev.date) return;

    // Build all upcoming occurrences to check (today + next 7 days for recurring)
    const occurrences = [];
    const base = new Date(ev.date + 'T00:00:00');

    if (ev.recurrence === 'yearly') {
      // check this year and next year
      [now.getFullYear(), now.getFullYear()+1].forEach(yr => {
        const d = new Date(yr, base.getMonth(), base.getDate());
        occurrences.push(d);
      });
    } else if (ev.recurrence === 'monthly') {
      // check this month and next
      [0,1,2].forEach(offset => {
        const d = new Date(now.getFullYear(), now.getMonth()+offset, base.getDate());
        occurrences.push(d);
      });
    } else {
      occurrences.push(base);
    }

    occurrences.forEach(occ => {
      // Set event time to midnight of that day (full day events)
      const eventTime = new Date(occ);
      eventTime.setHours(0, 0, 0, 0);

      const msUntil   = eventTime - now;
      const minsUntil = msUntil / 60000;

      const dateStr  = eventTime.toISOString().slice(0,10);
      const fireKey  = `${ev.id||ev.title}_${dateStr}`;

      // Fire if within the reminder window and not already notified
      // Window: between REMIND_MINS and REMIND_MINS+2 (2 min grace for the interval)
      // OR same day (0 to REMIND_MINS)
      const sameDay = minsUntil >= 0 && minsUntil < 60*24;
      const inWindow = minsUntil >= 0 && minsUntil <= REMIND_MINS + 2;

      if (sameDay && !notified.has(fireKey)) {
        notified.add(fireKey);
        changed = true;

        const color = EVENT_COLORS[ev.type] || '#a3e635';
        const label = EVENT_LABELS[ev.type] || ev.type;
        const dayLabel = minsUntil < 1 ? "Aujourd'hui maintenant"
                       : minsUntil < 60 ? `Dans ${Math.round(minsUntil)} min`
                       : `Aujourd'hui`;

        // Browser push notification
        if (Notification.permission === 'granted') {
          new Notification(`${label}: ${ev.title}`, {
            body: dayLabel,
            icon: '/favicon.ico',
            tag:  fireKey,
            silent: false
          });
        }

        // In-app toast
        showToast(`${label}: ${ev.title}`, dayLabel, color);
      }
    });
  });

  if (changed) saveNotified(notified);
}

async function initNotifications() {
  if (!('Notification' in window)) return;

  if (Notification.permission === 'default') {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      showToast('Notifications activées', 'Vault va te notifier pour tes événements.', '#a3e635');
    }
  }

  // Run immediately, then every 60 seconds
  checkCalendarNotifications();
  setInterval(checkCalendarNotifications, 60_000);
}

// ═══════════════════════════ PLAID LINK ═══════════════════════════
async function openPlaidLink() {
  try {
    // Get link token from backend
    const res = await fetch('/api/plaid/link_token', {method:'POST'});
    const data = await res.json();
    if (!data.link_token) { alert('Plaid error: ' + (data.error_message || data.error || JSON.stringify(data))); return; }

    // Open Plaid Link
    const handler = Plaid.create({
      token: data.link_token,
      onSuccess: async (public_token, metadata) => {
        const r = await fetch('/api/plaid/exchange', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({public_token})
        });
        const d = await r.json();
        if (d.ok) {
          // Poll /api/status until ready then reload
          const pollStatus = async () => {
            try {
              const s = await fetch('/api/status');
              const sd = await s.json();
              if (sd.status === 'ready') {
                location.reload();
              } else {
                setTimeout(pollStatus, 1500);
              }
            } catch(e) { setTimeout(pollStatus, 2000); }
          };
          alert('Account connected! Loading your data...');
          setTimeout(pollStatus, 2000);
        } else {
          alert('Exchange error: ' + d.error);
        }
      },
      onExit: (err) => {
        if (err) console.error('Plaid Link exit:', err);
      }
    });
    handler.open();
  } catch(e) {
    alert('Failed to open Plaid Link: ' + e.message);
  }
}

// ═══════════════════════════ GOOGLE CALENDAR ═══════════════════════════
let GCAL_EVENTS = []; // [{id,title,start,end,allDay,color,location,description}]
let GCAL_CONNECTED = false;

function connectGCal(){
  window.location.href = '/api/auth/google';
}

function loadGCalEvents(){
  fetch('/api/gcal', { credentials: 'include' })
    .then(r => r.json())
    .then(data => {
      GCAL_CONNECTED = data.connected || false;
      GCAL_EVENTS = data.events || [];
      // Update button label if on settings page
      const lbl = document.getElementById('gcal-btn-label');
      if(lbl) lbl.textContent = GCAL_CONNECTED ? 'Reconnect' : 'Connect';
      // Re-render calendar if currently visible
      const active = document.querySelector('.nav-item.active');
      if(active && active.dataset.page === 'calendar') navigate('calendar');
    })
    .catch(()=>{});
}

function gcalEventsForDay(isoDate){
  return GCAL_EVENTS.filter(e => {
    const s = (e.start||'').slice(0,10);
    const en = (e.end||'').slice(0,10);
    return isoDate >= s && isoDate <= en;
  });
}

function showToast(msg, type='success'){
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:8px;font-size:13px;font-family:var(--font);z-index:9999;transition:opacity .3s;background:${type==='error'?'#ef4444':'#22c55e'};color:#fff;font-weight:500`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}
