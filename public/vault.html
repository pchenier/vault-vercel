<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiscit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/static/feather.min.js"></script>
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<style>
:root {
  --bg:       #080808;
  --bg2:      #0f0f0f;
  --bg3:      #161616;
  --bg4:      #1e1e1e;
  --bg5:      #262626;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.04);
  --text:     #f4f4f5;
  --text2:    #a1a1aa;
  --text3:    #52525b;
  --text4:    #3f3f46;
  --green:    #4ade80;
  --green-bg: rgba(74,222,128,0.08);
  --green-br: rgba(74,222,128,0.14);
  --red:      #f87171;
  --red-bg:   rgba(248,113,113,0.08);
  --red-br:   rgba(248,113,113,0.14);
  --blue:     #60a5fa;
  --blue-bg:  rgba(96,165,250,0.08);
  --yellow:   #fbbf24;
  --yellow-bg:rgba(251,191,36,0.08);
  --purple:   #a78bfa;
  --r:        12px;
  --r-sm:     8px;
  --r-xs:     6px;
  --sidebar:  228px;
  --topbar:   58px;
  --font:     'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{text-decoration:none;color:inherit}
button{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text4)}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);height:100vh;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px 10px;
  position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto
}
.logo{
  display:flex;align-items:center;gap:9px;
  padding:6px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:14px
}
.logo-mark{
  width:26px;height:26px;background:var(--text);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--bg);letter-spacing:-0.5px;flex-shrink:0
}
.logo-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.nav-group{margin-bottom:22px}
.nav-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text4);padding:0 8px;margin-bottom:3px
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:7px 9px;
  border-radius:var(--r-xs);cursor:pointer;color:var(--text3);
  font-size:13px;font-weight:450;transition:all .12s;user-select:none;
  margin-bottom:1px;border:1px solid transparent
}
.nav-item:hover{background:var(--bg3);color:var(--text2)}
.nav-item.active{background:var(--bg4);color:var(--text);font-weight:500}
.nav-item .ico{width:15px;height:15px;flex-shrink:0;opacity:.55}
.nav-item.active .ico{opacity:.9}
.nav-badge{
  margin-left:auto;background:var(--red-bg);color:var(--red);
  font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;
  border:1px solid var(--red-br)
}
.sidebar-foot{
  margin-top:auto;padding-top:12px;border-top:1px solid var(--border)
}
.user-row{
  display:flex;align-items:center;gap:9px;padding:7px 9px;
  border-radius:var(--r-xs);cursor:pointer;transition:background .12s
}
.user-row:hover{background:var(--bg3)}
.avatar{
  width:27px;height:27px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:600;color:#fff;flex-shrink:0
}
.user-name{font-size:12.5px;font-weight:500;color:var(--text)}
.user-plan{font-size:10.5px;color:var(--text3)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  height:var(--topbar);background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:12px;
  position:sticky;top:0;z-index:50;flex-shrink:0
}
.topbar-title{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.topbar-breadcrumb{font-size:13px;color:var(--text3);margin-left:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.icon-btn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-xs);cursor:pointer;color:var(--text3);
  border:1px solid var(--border);background:transparent;transition:all .12s
}
.icon-btn:hover{background:var(--bg3);color:var(--text2)}
.icon-btn svg{width:14px;height:14px}
.sync-dot{
  width:7px;height:7px;background:var(--green);border-radius:50%;
  box-shadow:0 0 6px var(--green)
}
.content{flex:1;overflow-y:auto;padding:28px 32px;min-height:0}

/* ── METRICS ── */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.metric-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.02em;margin-bottom:8px;text-transform:uppercase}
.metric-val{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.6px;font-variant-numeric:tabular-nums;margin-bottom:5px;line-height:1}
.metric-delta{font-size:11.5px;font-weight:500;display:flex;align-items:center;gap:3px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--text3)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
.card-xs{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}

/* ── SECTION HDR ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:-.1px}
.sec-link{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color .12s}
.sec-link:hover{color:var(--text2)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g2-1{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.g1-2{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}

/* ── TXN LIST ── */
.txn-list{display:flex;flex-direction:column}
.txn{
  display:flex;align-items:center;gap:11px;padding:9px 0;
  border-bottom:1px solid var(--border2);transition:background .1s
}
.txn:last-child{border-bottom:none}
.txn-ico{
  width:32px;height:32px;border-radius:9px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.txn-ico svg{width:16px;height:16px}
.txn-info{flex:1;min-width:0}
.txn-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-sub{font-size:11px;color:var(--text3);margin-top:1px}
.txn-right{text-align:right;flex-shrink:0}
.txn-amt{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.txn-amt.debit{color:var(--text)}
.txn-amt.credit{color:var(--green)}
.txn-date{font-size:11px;color:var(--text3)}

/* ── BUDGET ── */
.budget-item{display:flex;flex-direction:column;gap:6px;padding:12px 0;border-bottom:1px solid var(--border2)}
.budget-item:last-child{border-bottom:none}
.budget-row{display:flex;align-items:center;justify-content:space-between}
.budget-cat{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--text)}
.budget-cat-ico{display:inline-flex;align-items:center;vertical-align:middle}
.budget-nums{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.pbar{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .3s ease}
.pfill.ok{background:var(--green)}.pfill.warn{background:var(--yellow)}.pfill.over{background:var(--red)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:500}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-br)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-br)}
.b-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,.14)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.14)}
.b-purple{background:rgba(167,139,250,.08);color:var(--purple);border:1px solid rgba(167,139,250,.14)}

/* ── BTNS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .12s;border:none}
.btn svg{width:13px;height:13px}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11.5px}

/* ── ACCOUNT CARD ── */
.acc-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;transition:border-color .15s;cursor:default
}
.acc-card:hover{border-color:rgba(255,255,255,.11)}
.acc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.acc-logo{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0
}
.acc-title{font-size:13px;font-weight:500;color:var(--text)}
.acc-sub{font-size:11px;color:var(--text3)}
.acc-bal{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin-bottom:3px}
.acc-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ── INSIGHT CARD ── */
.insight{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:flex;gap:12px;align-items:flex-start
}
.insight-ico{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;margin-top:1px
}
.insight-ico svg{width:16px;height:16px}
}
.insight h4{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;letter-spacing:-.1px}
.insight p{font-size:12px;color:var(--text3);line-height:1.6}

/* ── HABIT ── */
.habit-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.habit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.habit-name{font-size:13px;font-weight:500;color:var(--text)}
.habit-streak{font-size:12px;font-weight:600;color:var(--yellow)}
.habit-dots{display:flex;gap:3px;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:2px}
.dot.done{background:var(--green);opacity:.75}
.dot.miss{background:var(--bg5)}
.dot.today{background:var(--blue)}
.habit-stat{font-size:11px;color:var(--text3);margin-top:6px}

/* ── GYM HEATMAP ── */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.hm-day{aspect-ratio:1;border-radius:3px;background:var(--bg4)}
.hm-day.w{background:var(--green);opacity:.65}
.hm-day.r{background:var(--bg3)}
.hm-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.hm-label{font-size:9.5px;color:var(--text4);text-align:center}

/* ── CRYPTO ── */
.crypto-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border2)}
.crypto-row:last-child{border-bottom:none}
.coin-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

/* ── INVESTMENT ── */
.inv-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.inv-row:last-child{border-bottom:none}
.ticker-box{
  width:34px;height:34px;border-radius:8px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  color:var(--text2);flex-shrink:0
}

/* ── BILL ── */
.bill-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border2)}
.bill-row:last-child{border-bottom:none}
.bill-date-box{width:34px;text-align:center;flex-shrink:0}
.bill-day{font-size:16px;font-weight:600;color:var(--text);line-height:1}
.bill-mo{font-size:9.5px;color:var(--text3);text-transform:uppercase}

/* ── MEAL ── */
.meal-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.meal-row:last-child{border-bottom:none}
.meal-ico{width:30px;height:30px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.meal-ico svg{width:16px;height:16px}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{
  min-height:68px;border-radius:var(--r-sm);background:var(--bg3);
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;
  padding:6px 7px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;
  transition:all .15s ease;
  position:relative;overflow:hidden
}
.cal-cell:hover{background:var(--bg4);transform:translateY(-1px)}
.cal-cell.today{
  background:var(--bg4);color:var(--text);
  box-shadow:0 0 0 1px var(--green),0 0 12px 1px rgba(74,222,128,.25);
  z-index:1
}
.cal-cell.today:hover{box-shadow:0 0 0 1px var(--green),0 0 18px 2px rgba(74,222,128,.35)}
.cal-cell.has-event::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cal-cell.empty{background:transparent;cursor:default}
.cal-day-hdr{font-size:10px;font-weight:700;color:var(--text3);text-align:center;padding:6px 0;letter-spacing:.5px;text-transform:uppercase}
.cal-ev-chip{display:block;font-size:9.5px;font-weight:600;padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4}
.cal-dot-row{display:flex;gap:2px;flex-wrap:wrap;margin-top:auto;padding-top:2px}
.cal-view-toggle{display:flex;gap:2px;background:var(--bg3);border-radius:6px;padding:2px}
.cal-view-btn{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:transparent;font-family:var(--font);transition:all .12s}
.cal-view-btn.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.cal-week-grid{display:grid;grid-template-columns:56px repeat(7,1fr);position:relative}
.cal-day-view-grid{display:grid;grid-template-columns:56px 1fr;position:relative}
.cal-time-col{font-size:10px;color:var(--text4);text-align:right;padding-right:8px;line-height:48px;height:48px;user-select:none}
.cal-day-col{border-left:1px solid var(--border);position:relative;min-height:48px}
.cal-day-col.today-col{background:rgba(74,222,128,.03)}
.cal-day-hdr-cell{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 0;font-size:12px;font-weight:500;color:var(--text2)}
.cal-day-hdr-cell.today-col{color:var(--text)}
.cal-date-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-date-num.is-today{background:var(--green);color:var(--bg);font-weight:700}
.cal-time-line{border-top:1px solid var(--border);height:48px;position:relative}
.cal-time-line-30{border-top:1px dotted var(--border2);height:0;position:absolute;top:24px;left:0;right:0}
.cal-ev-block{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2;line-height:1.3;transition:opacity .12s}
.cal-ev-block:hover{opacity:.85}
.cal-now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:3}
.cal-now-line::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--red)}

/* ── SETTINGS ── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border2)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.setting-desc{font-size:11.5px;color:var(--text3)}
.toggle{
  width:36px;height:20px;background:var(--bg5);border-radius:10px;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0
}
.toggle.on{background:var(--green);opacity:.8}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:16px;height:16px;background:var(--text);border-radius:50%;
  transition:transform .2s
}
.toggle.on::after{transform:translateX(16px)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-inp{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:7px 12px;color:var(--text);font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .12s;width:200px
}
.search-inp:focus{border-color:rgba(255,255,255,.15)}
.search-inp::placeholder{color:var(--text4)}
.sel{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:7px 10px;color:var(--text2);font-family:var(--font);font-size:12px;outline:none;cursor:pointer
}

/* ── FADE ── */
.fade-in{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── CHART WRAPPERS ── */
.chart-wrap{position:relative;width:100%}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.empty svg{opacity:.15;margin-bottom:10px}
.empty h3{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:3px}
.empty p{font-size:12px;color:var(--text3)}

/* ── CONN CARD ── */
.connect-card{
  background:var(--bg2);border:1px dashed var(--border);border-radius:var(--r);
  padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;text-align:center
}
.connect-card:hover{border-color:rgba(255,255,255,.14);background:var(--bg3)}
.connect-card span{font-size:13px;color:var(--text3)}

@media(max-width:1180px){
  .metrics-row{grid-template-columns:repeat(2,1fr)}

<script>
// Feather icon helper — generates inline SVG processed by feather.replace()
function ico(name,sz){sz=sz||14;return '<svg data-feather="'+name+'" width="'+sz+'" height="'+sz+'"></svg>';}

// ═══════════════════════════ MOCK DATA ═══════════════════════════
const D = {
  netWorth: 0,
  netWorthHistory: [],
  monthLabels: [],
  income: 0,
  spending: 0,
  cashFlow: 0,
  totalDebt: 0,
  accounts: [],
  txns: [],
  budget: [],
  catLabels: [],
  catAmounts: [],
  investments: [],
  investHistory: [],
  crypto: [],
  habits: [],
  gym: [],
  gymDays: [],
  meals: [],
  bills: [],
  userEmail: '',
  userName: '',
  connections: {plaid:false,wise:false,crypto:false},
  wallets: [],
};

// ═══════════════════════════ HELPERS ═══════════════════════════
const fmt = (n,decimals=0)=>{
  if(typeof n!=='number'||isNaN(n)) return '—';
  const abs = Math.abs(n);
  const s = abs.toLocaleString('en-CA',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  return n<0?'-$'+s:'$'+s;
};
const fmtPct = p => (p>=0?'+':'')+p.toFixed(1)+'%';
const deltaClass = d => d>0?'up':d<0?'down':'flat';
const deltaIcon = d => d>0?'▲':d<0?'▼':'–';

Chart.defaults.color='#52525b';
Chart.defaults.font.family="'Inter',sans-serif";
Chart.defaults.font.size=11;

const chartRegistry = {};
function destroyChart(id){if(chartRegistry[id]){chartRegistry[id].destroy();delete chartRegistry[id];}}

// ═══════════════════════════ NAVIGATION ═══════════════════════════
function navigate(page){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
  });
  const now = new Date();
  const nowStr = now.toLocaleString('en',{month:'long',year:'numeric'});
  const titles={dashboard:'Dashboard',accounts:'Accounts',transactions:'Transactions',
    budget:'Budget',insights:'Insights',investments:'Investments',crypto:'Crypto',
    gym:'Gym Tracker',eating:'Eating',habits:'Habits',calendar:'Calendar',settings:'Settings'};
  const subs={dashboard:nowStr,accounts:D.accounts?(D.accounts.length+' connected account'+(D.accounts.length!==1?'s':'')):'0 connected accounts',transactions:'All transactions',
    budget:nowStr,insights:'AI-powered insights',investments:'Portfolio overview',
    crypto:'Crypto holdings',gym:'Workout tracker',eating:'Nutrition',habits:'Daily habits',
    calendar:nowStr,settings:'Account & preferences'};
  document.getElementById('page-title').textContent=titles[page]||'Dashboard';
  document.getElementById('page-sub').textContent=subs[page]||'';
  const c=document.getElementById('content');
  c.innerHTML='<div class="fade-in">'+renderPage(page)+'</div>';
  Object.keys(chartRegistry).forEach(destroyChart);
  updateBudgetBadge();
  requestAnimationFrame(()=>{
    if(page==='dashboard')initDashCharts();
    if(page==='savings')initSavingsChart();
    if(page==='investments')initInvCharts();
    if(page==='crypto')initCryptoCharts();
    if(page==='transactions') filterTxns();
    feather.replace({width:14,height:14});
  });
}

function renderPage(p){
  switch(p){
    case 'dashboard':     return pgDashboard();
    case 'accounts':      return pgAccounts();
    case 'transactions':  return pgTransactions();
    case 'budget':        return pgBudget();
    case 'insights':      return pgInsights();
    case 'savings':       return pgSavings();
    case 'subscriptions': return pgSubscriptions();
    case 'investments':   return pgInvestments();
    case 'crypto':        return pgCrypto();
    case 'gym':           return pgGym();
    case 'eating':        return pgEating();
    case 'habits':        return pgHabits();
    case 'calendar':      return pgCalendar();
    case 'settings':      return pgSettings();
    default: return pgDashboard();
  }
}

// ═══════════════════════════ DASHBOARD ═══════════════════════════
function pgDashboard(){
  // Apply overrides + exclude P2P/self transfers from all calculations
  const allTxns = applyOverrides(applyRules(D.txns));
  const txns = allTxns.filter(t => !EXCLUDED_CATS.has(t.cat));

  const income   = txns.filter(t=>t.amt>0).reduce((s,t)=>s+t.amt,0) || D.income;
  const spending = txns.filter(t=>t.amt<0).reduce((s,t)=>s+Math.abs(t.amt),0) || D.spending;
  const cashFlow = income - spending;

  const txn5 = allTxns.slice(0,5).map(t=>{
    const excl = EXCLUDED_CATS.has(t.cat);
    return`
    <div class="txn" style="${excl?'opacity:.4':''}">
      <div class="txn-ico">${ico(t.ico||'folder',14)}</div>
      <div class="txn-info">
        <div class="txn-name">${t.name}</div>
        <div class="txn-sub">${t.cat} · ${t.acc}</div>
      </div>
      <div class="txn-right">
        <div class="txn-amt ${t.amt<0?'debit':'credit'}">${fmt(t.amt,2)}</div>
        <div class="txn-date">${t.date}</div>
      </div>
    </div>`;}).join('');

  const budget3=(typeof getBudgetItems==='function' ? getBudgetItems().filter(b=>!b.hidden && (b.lim>0||b.spent>0)).slice(0,5) : D.budget.slice(0,5)).map(b=>{
    const pct=Math.min((b.spent/b.lim)*100,100);
    const cls=pct>=100?'over':pct>=85?'warn':'ok';
    return`<div class="budget-item">
      <div class="budget-row">
        <div class="budget-cat"><span class="budget-cat-ico">${ico(b.ico,15)}</span>${b.cat}</div>
        <div class="budget-nums">${fmt(b.spent,0)} <span style="color:var(--text4)">/ ${fmt(b.lim,0)}</span></div>
      </div>
      <div class="pbar"><div class="pfill ${cls}" style="width:${pct}%"></div></div>
    </div>`;}).join('');

  const bills=D.bills.slice(0,4).map(b=>`
    <div class="bill-row">
      <div class="bill-date-box"><div class="bill-day">${b.day}</div><div class="bill-mo">${b.mo}</div></div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">${b.name}</div></div>
      <div style="font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums">${fmt(b.amt,2)}</div>
    </div>`).join('');

  const habitSnap=D.habits.slice(0,3).map(h=>{
    const done=h.done.filter(x=>x).length;
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2)">
      <span style="font-size:13px;color:var(--text)">${h.name}</span>
      <span class="badge b-yellow">${h.streak}d streak</span>
    </div>`;}).join('');

  return`
  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Net Worth</div>
      <div class="metric-val">${fmt(D.netWorth,0)}</div>
      <div class="metric-delta up">▲ All accounts</div>
    </div>
    <div class="metric">
      <div class="metric-label">Monthly Income</div>
      <div class="metric-val">${fmt(income,0)}</div>
      <div class="metric-delta flat">This month</div>
    </div>
    <div class="metric">
      <div class="metric-label">Monthly Spending</div>
      <div class="metric-val">${fmt(spending,0)}</div>
      <div class="metric-delta flat">Excl. P2P & transfers</div>
    </div>
    <div class="metric">
      <div class="metric-label">Cash Flow</div>
      <div class="metric-val" style="color:${cashFlow>=0?'var(--green)':'var(--red)'}">${fmt(cashFlow,0)}</div>
      <div class="metric-delta ${cashFlow>=0?'up':'down'}">${cashFlow>=0?'▲ Positive':'▼ Negative'}</div>
    </div>
  </div>

  <div class="g2-1 mb20">
    <div class="card">
      <div class="sec-hdr">
        <span class="sec-title">Net Worth — 12 months</span>
        <span class="badge b-green">+28.6% YTD</span>
      </div>
      <div class="chart-wrap" style="height:180px"><canvas id="nwChart"></canvas></div>
    </div>
    <div class="card">
      <div class="sec-hdr"><span class="sec-title">Spending by Category</span></div>
      <div class="chart-wrap" style="height:180px"><canvas id="catChart"></canvas></div>
    </div>
  </div>

  <div class="g2-1 mb20">
    <div class="card">
      <div class="sec-hdr">
        <span class="sec-title">Recent Transactions</span>
        <button class="sec-link" onclick="navigate('transactions')">View all</button>
      </div>
      <div class="txn-list">${txn5}</div>
    </div>
    <div>
      <div class="card mb16">
        <div class="sec-hdr">
          <span class="sec-title">Budget</span>
          <button class="sec-link" onclick="navigate('budget')">View all</button>
        </div>
        ${budget3}
      </div>
    </div>
  </div>

  <div class="g2">
    <div class="card">
      <div class="sec-hdr">
        <span class="sec-title">Upcoming Bills</span>
        <button class="sec-link" onclick="navigate('calendar')">Calendar</button>
      </div>
      ${bills}
    </div>
    <div class="card">
      <div class="sec-hdr">
        <span class="sec-title">Habit Streaks</span>
        <button class="sec-link" onclick="navigate('habits')">View all</button>
      </div>
      ${habitSnap}
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
        <div style="font-size:28px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums">74%</div>
        <div><div style="font-size:12px;font-weight:500;color:var(--text2)">Completion rate</div><div style="font-size:11px;color:var(--text3)">Last 30 days</div></div>
      </div>
    </div>
  </div>`;
}

function initDashCharts(){
  const nwCtx=document.getElementById('nwChart')?.getContext('2d');
  if(nwCtx){
    const grad=nwCtx.createLinearGradient(0,0,0,180);
    grad.addColorStop(0,'rgba(74,222,128,0.15)');
    grad.addColorStop(1,'rgba(74,222,128,0)');
    chartRegistry.nw=new Chart(nwCtx,{
      type:'line',
      data:{
        labels:D.monthLabels,
        datasets:[{
          data:D.netWorthHistory,
          borderColor:'#4ade80',borderWidth:1.5,
          backgroundColor:grad,fill:true,
          pointRadius:0,pointHoverRadius:4,
          tension:0.4
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#1e1e1e',borderColor:'rgba(255,255,255,0.07)',borderWidth:1,
          titleColor:'#a1a1aa',bodyColor:'#f4f4f5',padding:10,
          callbacks:{label:ctx=>' '+fmt(ctx.parsed.y,0)}
        }},
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{color:'#52525b',font:{size:10}}},
          y:{grid:{color:'rgba(255,255,255,0.04)'},border:{display:false},
             ticks:{color:'#52525b',font:{size:10},callback:v=>fmt(v,0)}}
        }
      }
    });
  }

  const catCtx=document.getElementById('catChart')?.getContext('2d');
  if(catCtx){
    // Use real budget items (from transactions) if available, else fall back to mock
    const realBudget = (typeof getBudgetItems==='function') ? getBudgetItems().filter(b=>!b.hidden && b.spent>0).slice(0,6) : [];
    const labels = realBudget.length ? realBudget.map(b=>b.cat) : (D.catLabels && D.catLabels.length) ? D.catLabels : D.budget.slice(0,5).map(b=>b.cat);
    const amounts = realBudget.length ? realBudget.map(b=>b.spent) : (D.catAmounts && D.catAmounts.length) ? D.catAmounts : D.budget.slice(0,5).map(b=>b.spent);
    chartRegistry.cat=new Chart(catCtx,{
      type:'doughnut',
      data:{
        labels:labels,
        datasets:[{
          data:amounts,
          backgroundColor:['#4ade80','#60a5fa','#a78bfa','#fbbf24','#f87171'],
          borderWidth:0,hoverBorderWidth:0
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        cutout:'70%',
        plugins:{
          legend:{
            position:'right',
            labels:{boxWidth:8,boxHeight:8,padding:10,color:'#a1a1aa',font:{size:10},
              usePointStyle:true,pointStyleWidth:8}
          },
          tooltip:{
            backgroundColor:'#1e1e1e',borderColor:'rgba(255,255,255,0.07)',borderWidth:1,
            padding:10,bodyColor:'#f4f4f5',
            callbacks:{label:ctx=>' '+fmt(ctx.parsed,2)}
          }
        }
      }
    });
  }
}

// ═══════════════════════════ ACCOUNTS ═══════════════════════════
function pgAccounts(){
  const total=D.accounts.filter(a=>a.type!=='Credit Card').reduce((s,a)=>s+(typeof a.bal==='number'?a.bal:0),0);
  const cards=D.accounts.map(a=>`
    <div class="acc-card">
      <div class="acc-top">
        <div class="acc-logo" style="background:${a.color}20;color:${a.color}">${a.init}</div>
        <div>

      <div class="acc-bal" style="${a.bal<0?'color:var(--red)':''}">${fmt(a.bal,2)}</div>

    </div>
    <div class="metric">
      <div class="metric-label">Total Debt</div>
      <div class="metric-val" style="color:var(--red)">${fmt(D.totalDebt,0)}</div>
      <div class="metric-delta flat">Credit cards</div>
    </div>
    <div class="metric">
      <div class="metric-label">Investments</div>
      <div class="metric-val">${fmt(D.investments.reduce((s,i)=>s+(i.val||0),0),0)||'—'}</div>
      <div class="metric-delta flat">Portfolio value</div>
    </div>
    <div class="metric">
      <div class="metric-label">Connected</div>
      <div class="metric-val">${D.accounts?D.accounts.length:0}</div>
      <div class="metric-delta flat">Accounts synced</div>
    </div>
  </div>
  <div class="sec-hdr mb16">
    <span class="sec-title">All Accounts</span>
    <button class="btn btn-primary btn-sm" onclick="showAddAccount()"><svg data-feather="plus"></svg> Add Account</button>
  </div>
  <div class="g3 mb16">${cards}</div>
  <div class="g3">
    <div class="connect-card" onclick="showAddAccount()" style="cursor:pointer">
      <svg data-feather="plus-circle" style="width:22px;height:22px;opacity:.2"></svg>

}

// ═══════════════════════════ TRANSACTIONS ═══════════════════════════
// ── Transaction rules (persisted in localStorage) ────────────────────────────
const TXN_RULES_KEY = 'vault_txn_rules';
function getRules(){ try{ return JSON.parse(localStorage.getItem(TXN_RULES_KEY)||'[]'); }catch(e){return[];} }
function saveRules(rules){ localStorage.setItem(TXN_RULES_KEY, JSON.stringify(rules)); }

function applyRules(txns){
  const rules = getRules();
  if(!rules.length) return txns;
  return txns.map(t=>{
    let result = {...t};
    for(const r of rules){
      const field = (result[r.field]||'').toLowerCase();
      const val   = (r.value||'').toLowerCase();
      let match = false;
      if(r.operator==='contains')    match = field.includes(val);
      if(r.operator==='starts_with') match = field.startsWith(val);
      if(r.operator==='equals')      match = field === val;
      if(match){
        result.cat = r.cat;
        result.ico = catIco(r.cat);
      }
    }
    return result;
  });
}

function addCat(){
  const inp = document.getElementById('new-cat-inp');
  const name = inp.value.trim();
  if(!name) return;
  const cats = getCats();
  if(cats.includes(name)){ inp.value=''; return; }
  cats.push(name);
  saveCats(cats);
  ALL_CATS = cats;
  inp.value='';
  renderCatsList();
  // refresh all selects in the modal
  refreshCatSelects();
}
function deleteCat(name){
  const cats = getCats().filter(c=>c!==name);
  saveCats(cats);
  ALL_CATS = cats;
  renderCatsList();
  refreshCatSelects();
}
function renderCatsList(){
  const el = document.getElementById('cats-list');
  if(!el) return;
  const cats = getCats();

function filterTxns(q){
  const search = (q||document.querySelector('.search-inp')?.value||'').toLowerCase();
  const cat    = document.getElementById('catFilter')?.value||'';
  let list = applyOverrides(applyRules(D.txns));
  if(search) list = list.filter(t=>(t.name||'').toLowerCase().includes(search)||(t.cat||'').toLowerCase().includes(search)||(t.acc||'').toLowerCase().includes(search));
  if(cat)    list = list.filter(t=>t.cat===cat);
  if(_txnDateFilter){
    // match "Jun 04" style dates against iso
    const iso = _txnDateFilter; // "2026-06-04"
    const d = new Date(iso+'T00:00');
    const moShort = d.toLocaleString('en',{month:'short'}); // "Jun"
    const dayNum  = d.getDate(); // 4
    const dayPad  = String(dayNum).padStart(2,'0'); // "04"
    list = list.filter(t=>{
      const raw = t.date_iso||t.date||'';
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw===iso;
      // "Jun 04" format
      return raw===`${moShort} ${dayPad}` || raw===`${moShort} ${dayNum}`;
    });
  }
  renderTxnList(list);
}

const BUDGET_KEY    = 'vault_budget_limits';
const BUDGET_HIDDEN = 'vault_budget_hidden';
const BUDGET_ORDER  = 'vault_budget_order';

const DEFAULT_LIMITS = {
  'Groceries':         500,
  'Food/Dining':       300,
  'Gas':               200,
  'Transport':         150,
  'Shopping':          300,
  'Gym':               100,
  'Health':            100,
  'Phone/Internet':    100,
  'Entertainment':     150,
  'Subscriptions':     100,
  'Housing':          1300,
  'Utilities':         150,
  'Other':             200,
};

function getBudgetLimits(){
  try{
    const saved = JSON.parse(localStorage.getItem(BUDGET_KEY)||'{}');
    // Merge defaults with saved — saved wins
    return Object.assign({}, DEFAULT_LIMITS, saved);
  }catch(e){return Object.assign({}, DEFAULT_LIMITS);}
}
function saveBudgetLimit(cat, lim){
  const o=getBudgetLimits(); o[cat]=lim; localStorage.setItem(BUDGET_KEY,JSON.stringify(o));
}
function getHidden(){
  try{ return new Set(JSON.parse(localStorage.getItem(BUDGET_HIDDEN)||'[]')); }catch(e){return new Set();}
}
function toggleHidden(cat){
  const h=getHidden();
  h.has(cat)?h.delete(cat):h.add(cat);
  localStorage.setItem(BUDGET_HIDDEN,JSON.stringify([...h]));
}
function getBudgetOrder(){
  try{ const o=JSON.parse(localStorage.getItem(BUDGET_ORDER)||'null'); return o||null; }catch(e){return null;}
}
function saveBudgetOrder(arr){ localStorage.setItem(BUDGET_ORDER,JSON.stringify(arr)); }

function getBudgetItems(){
  const limits   = getBudgetLimits();
  const hidden   = getHidden();
  const order    = getBudgetOrder();
  const txns     = applyOverrides(applyRules(D.txns));
  const now      = new Date();

  // spending per cat this month
  const catSpend = {};
  const nowMonth = now.getMonth();
  const nowYear  = now.getFullYear();
  txns.forEach(t=>{
    if(EXCLUDED_CATS.has(t.cat)) return;
    if(t.amt>=0) return; // income
    const raw = t.date_iso || t.date || '';
    // Parse YYYY-MM-DD safely (avoid UTC offset bug)
    let d;
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
      const [y,m,day] = raw.split('-').map(Number);
      d = new Date(y, m-1, day);
    } else {
      d = new Date(raw);
    }
    if(d.getMonth()===nowMonth && d.getFullYear()===nowYear){
      catSpend[t.cat] = (catSpend[t.cat]||0) + Math.abs(t.amt);
    }
  });

  // Build from ALL_CATS + any cats with spending not in ALL_CATS
  const allCats = [...new Set([...ALL_CATS, ...Object.keys(catSpend)])];
  let items = allCats.map(cat=>({
    cat,
    ico:   catIco(cat),
    spent: Math.round((catSpend[cat]||0)*100)/100,
    lim:   limits[cat] || 0,
    hidden: hidden.has(cat),
  }));

  // Sort by saved order if exists
  if(order){
    const idx = Object.fromEntries(order.map((c,i)=>[c,i]));
    items.sort((a,b)=>(idx[a.cat]??999)-(idx[b.cat]??999));
  }
  return items;
}

let _dragCat = null;
function initBudgetDrag(){
  const list = document.getElementById('budget-edit-list');
  if(!list) return;
  list.addEventListener('dragover', e=>{
    e.preventDefault();
    const target = e.target.closest('.budget-edit-row');
    if(target && target.dataset.cat !== _dragCat){
      const rows = [...list.querySelectorAll('.budget-edit-row')];
      const dragging = list.querySelector(`[data-cat="${_dragCat}"]`);
      const idx = rows.indexOf(target);
      const dragIdx = rows.indexOf(dragging);
      if(idx > dragIdx) target.after(dragging);
      else target.before(dragging);
    }
  });
  list.addEventListener('dragend', ()=>{
    const order = [...list.querySelectorAll('.budget-edit-row')].map(r=>r.dataset.cat);
    saveBudgetOrder(order);
    _dragCat = null;
  });
}
function budgetDragStart(e, cat){
  _dragCat = cat;
  const row = e.target.closest('.budget-edit-row');
  if(row) row.draggable = true;
  setTimeout(()=>{ if(row) row.draggable=true; },0);
}

function pgSavings(){
  const allTxns = applyOverrides(applyRules(D.txns));
  const txns = allTxns.filter(t => !EXCLUDED_CATS.has(t.cat));

  // Build last 12 months of data from transactions
  const now = new Date();
  const months = [];
  for(let i=11; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleString('en-CA',{month:'short'})+' '+d.getFullYear().toString().slice(2) });
  }

  const mData = months.map(m=>{
    const inc = txns.filter(t=>{
      if(t.amt<=0) return false;
      const raw=t.date_iso||t.date||'';
      let d;
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const [y,mo,dy]=raw.split('-').map(Number);d=new Date(y,mo-1,dy);}else{d=new Date(raw);}
      return d.getMonth()===m.month && d.getFullYear()===m.year;
    }).reduce((s,t)=>s+t.amt,0);
    const exp = txns.filter(t=>{
      if(t.amt>=0) return false;
      const raw=t.date_iso||t.date||'';
      let d;
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const [y,mo,dy]=raw.split('-').map(Number);d=new Date(y,mo-1,dy);}else{d=new Date(raw);}
      return d.getMonth()===m.month && d.getFullYear()===m.year;
    }).reduce((s,t)=>s+Math.abs(t.amt),0);
    const cf = inc - exp;
    const rate = inc>0 ? (cf/inc)*100 : 0;
    return { ...m, inc, exp, cf, rate };
  });

  // Current month (last entry)
  const cur = mData[mData.length-1];
  const avg12 = mData.filter(m=>m.inc>0).reduce((s,m)=>s+m.rate,0) / Math.max(1, mData.filter(m=>m.inc>0).length);
  const best = mData.reduce((b,m)=>m.rate>b.rate?m:b, mData[0]);
  const rateColor = cur.rate>=20?'var(--green)':cur.rate>=10?'#fbbf24':'var(--red)';

  return`
  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Savings Rate (This Month)</div>
      <div class="metric-val" style="color:${rateColor}">${cur.rate.toFixed(1)}%</div>
      <div class="metric-delta ${cur.rate>=20?'up':cur.rate>=10?'flat':'down'}">${cur.rate>=20?'▲ On track':cur.rate>=10?'→ Acceptable':'▼ Needs work'}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Cashflow This Month</div>
      <div class="metric-val" style="color:${cur.cf>=0?'var(--green)':'var(--red)'}">${fmt(cur.cf,0)}</div>
      <div class="metric-delta flat">Income ${fmt(cur.inc,0)} / Expenses ${fmt(cur.exp,0)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">12 Month Average</div>
      <div class="metric-val">${avg12.toFixed(1)}%</div>
      <div class="metric-delta flat">Rolling avg</div>
    </div>
    <div class="metric">
      <div class="metric-label">Best Month</div>
      <div class="metric-val" style="color:var(--green)">${best.rate.toFixed(1)}%</div>
      <div class="metric-delta up">${best.label}</div>
    </div>
  </div>

  ${cur.rate<10&&cur.inc>0?`<div class="insight mb20" style="border-color:var(--red-br);background:var(--red-bg)">
    <div class="insight-ico" style="background:var(--red-bg)"><svg data-feather="alert-circle" style="width:14px;height:14px"></svg></div>
    <div><h4 style="color:var(--red)">Savings rate under 10% this month</h4>
    <p>You spent ${fmt(cur.exp,0)} out of ${fmt(cur.inc,0)} of income. Aim for at least 20% to build wealth — that's ${fmt(cur.inc*0.2,0)} saved this month.</p></div>
  </div>`:cur.rate>=20?`<div class="insight mb20" style="border-color:var(--green-br);background:var(--green-bg)">
    <div class="insight-ico" style="background:var(--green-bg)"><svg data-feather="check-circle" style="width:14px;height:14px"></svg></div>
    <div><h4 style="color:var(--green)">Excellent — ${cur.rate.toFixed(1)}% savings rate this month</h4>
    <p>You saved ${fmt(cur.cf,0)} out of ${fmt(cur.inc,0)} of income. That's above the 20% recommended threshold for financial freedom.</p></div>
  </div>`:''}

  <div class="card mb20">
    <div class="sec-hdr"><span class="sec-title">Savings Rate — 12 Months</span></div>
    <div class="chart-wrap" style="height:220px"><canvas id="savingsChart"></canvas></div>
  </div>

  <div class="card">
    <div class="sec-hdr"><span class="sec-title">Monthly Detail</span></div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="color:var(--text3);border-bottom:1px solid var(--border2)">
            <th style="text-align:left;padding:8px 0;font-weight:500">Month</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Income</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Expenses</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Cashflow</th>
            <th style="text-align:right;padding:8px 0;font-weight:500">Rate</th>
          </tr>
        </thead>
        <tbody>
          ${[...mData].reverse().map(m=>`
          <tr style="border-bottom:1px solid var(--border2)">
            <td style="padding:9px 0;color:var(--text2)">${m.label}</td>
            <td style="text-align:right;color:var(--green)">${m.inc>0?fmt(m.inc,0):'—'}</td>
            <td style="text-align:right;color:var(--text2)">${m.exp>0?fmt(m.exp,0):'—'}</td>
            <td style="text-align:right;color:${m.cf>=0?'var(--green)':'var(--red)'}">${m.inc>0?fmt(m.cf,0):'—'}</td>
            <td style="text-align:right;font-weight:600;color:${m.rate>=20?'var(--green)':m.rate>=10?'#fbbf24':'var(--text3)'}">${m.inc>0?m.rate.toFixed(1)+'%':'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ═══════════════════════════ SUBSCRIPTIONS ═══════════════════════════
function pgSubscriptions(){
  const allTxns = applyOverrides(applyRules(D.txns));
  const txns = allTxns.filter(t => !EXCLUDED_CATS.has(t.cat));

  // All Subscriptions transactions (current month + last month for "new" detection)
  const now = new Date();
  const curM = now.getMonth(), curY = now.getFullYear();
  const prevM = curM===0?11:curM-1, prevY = curM===0?curY-1:curY;

  function parseDate(t){
    const raw=t.date_iso||t.date||'';
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const[y,m,d]=raw.split('-').map(Number);return new Date(y,m-1,d);}
    return new Date(raw);
  }

  const subs = txns.filter(t=>t.cat==='Subscriptions'&&t.amt<0);
  const curSubs  = subs.filter(t=>{ const d=parseDate(t); return d.getMonth()===curM&&d.getFullYear()===curY; });
  const prevSubs = subs.filter(t=>{ const d=parseDate(t); return d.getMonth()===prevM&&d.getFullYear()===prevY; });

  const prevNames = new Set(prevSubs.map(t=>t.name.toLowerCase().trim()));
  const totalCur = curSubs.reduce((s,t)=>s+Math.abs(t.amt),0);
  const totalPrev = prevSubs.reduce((s,t)=>s+Math.abs(t.amt),0);
  const diff = totalCur - totalPrev;

  // Group by service name
  const byName = {};
  curSubs.forEach(t=>{
    const k = t.name.trim();
    if(!byName[k]) byName[k]={ name:k, total:0, count:0, isNew:!prevNames.has(k.toLowerCase()) };
    byName[k].total += Math.abs(t.amt);
    byName[k].count++;
  });
  const services = Object.values(byName).sort((a,b)=>b.total-a.total);

  // Budget for subscriptions
  const budgetItems = getBudgetItems();
  const aboBudget = budgetItems.find(b=>b.cat==='Subscriptions');
  const aboBudgetLim = aboBudget?.lim||0;

  const noSubs = curSubs.length===0;

  return`
  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Total This Month</div>
      <div class="metric-val">${fmt(totalCur,2)}</div>
      <div class="metric-delta ${diff>0?'down':diff<0?'up':'flat'}">${diff===0?'→ Stable':diff>0?'▲ +'+fmt(Math.abs(diff),2)+' vs last month':'▼ '+fmt(Math.abs(diff),2)+' saved'}</div>
    </div>
    <div class="metric">

// ── Mini inline calendar for modals ─────────────────────────────────────────
function renderMiniCal(containerId, hiddenId, selectedISO){
  const el = document.getElementById(containerId);
  if(!el) return;
  const sel  = selectedISO ? new Date(selectedISO+'T00:00') : new Date();
  const today= new Date().toISOString().slice(0,10);
  const year = sel.getFullYear(), month = sel.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay    = (new Date(year, month, 1).getDay()+6)%7; // Mon-start

  const moName = sel.toLocaleString('en',{month:'long'});
  const dayH   = ['M','T','W','T','F','S','S'].map(d=>`<div style="font-size:9.5px;text-align:center;color:var(--text4);font-weight:600">${d}</div>`).join('');

  let cells = '<div style="opacity:0"></div>'.repeat(firstDay);
  for(let d=1;d<=daysInMonth;d++){
    const iso  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel = iso === (document.getElementById(hiddenId)?.value||selectedISO);
    const isTod = iso === today;
    cells += `<div onclick="pickCalDay('${iso}','${hiddenId}','${containerId}')"
      style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;
      border-radius:4px;font-size:10px;font-weight:${isSel?'600':'400'};cursor:pointer;
      background:${isSel?'var(--text)':'isTod'?'var(--bg4)':'transparent'};
      color:${isSel?'var(--bg)':isTod?'var(--text)':'var(--text2)'};
      outline:${isTod&&!isSel?'1px solid var(--border)':'none'};
      transition:background .1s" onmouseover="this.style.background=this.style.background||'var(--bg4)'" onmouseout="if(!this.classList.contains('sel'))this.style.background='${isSel?'var(--text)':'transparent'}'">
      ${d}</div>`;
  }

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <button onclick="shiftMiniCal('${containerId}','${hiddenId}',-1)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:1px 6px">‹</button>
      <span style="font-size:11px;font-weight:500;color:var(--text2)">${moName} ${year}</span>
      <button onclick="shiftMiniCal('${containerId}','${hiddenId}',1)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:1px 6px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">${dayH}${cells}</div>`;
}

function pickCalDay(iso, hiddenId, containerId){
  document.getElementById(hiddenId).value = iso;
  // re-render to show selected
  const d = new Date(iso+'T00:00');
  renderMiniCal(containerId, hiddenId, iso);
}

function shiftMiniCal(containerId, hiddenId, delta){
  // find current month from the header text or hidden value
  const cur = document.getElementById(hiddenId)?.value || new Date().toISOString().slice(0,10);
  const d   = new Date(cur+'T00:00');
  d.setMonth(d.getMonth()+delta);
  // keep same day if possible
  const newISO = d.toISOString().slice(0,10);
  renderMiniCal(containerId, hiddenId, newISO);
}

function wmPickType(type){

    const s=c.dataset.type===type;
    c.style.background=s?'var(--accent)':'var(--bg3)';
    c.style.color=s?'var(--bg)':'var(--text3)';
    c.style.borderColor=s?'var(--accent)':'var(--border)';

function pgGym(){
  const logs    = getGymLogs();
  const now     = new Date();
  const thisMo  = logs.filter(l=>{ const d=new Date(l.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const sessions = thisMo.length;

  // build 30-day heatmap
  const heatDays = [];
  for(let i=29;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    heatDays.push(logs.some(l=>l.date===iso));
  }
  const heatmap  = heatDays.map(w=>`<div class="hm-day ${w?'w':'r'}"></div>`).join('');
  const dayLabels= ['M','T','W','T','F','S','S'].map(d=>`<div class="hm-label">${d}</div>`).join('');

  // streak
  let streak=0;
  for(let i=0;i<30;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    if(logs.some(l=>l.date===d.toISOString().slice(0,10))) streak++;
    else break;
  }

  const logRows = logs.slice(0,10).map(l=>`
    <div class="txn" style="padding:10px 0">
      <div class="txn-ico">${WK_TPLS[l.workout]?.icon?ico(WK_TPLS[l.workout].icon,14):ico('activity',14)}</div>
      <div class="txn-info">
        <div class="txn-name">${l.workout}</div>
        <div class="txn-sub">${l.date}${l.duration?' · '+l.duration:''}${l.exercises?.length?' · '+l.exercises.join(', '):''}</div>
      </div>
      <div class="txn-right" style="display:flex;align-items:center;gap:8px">
        ${l.duration?`<div style="font-size:13px;font-weight:500;color:var(--text)">${l.duration}</div>`:''}
        <button onclick="deleteWorkout('${l.id}')" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:15px;padding:2px 4px" title="Delete">×</button>
      </div>
    </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No workouts logged yet</div>';

  return`
  <!-- Workout modal -->
  <div id="workout-modal" style="display:none;opacity:0;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:flex-end;justify-content:center;transition:opacity .15s">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:18px 20px;width:100%;max-width:480px;max-height:95vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:15px;font-weight:700;color:var(--text)">Log Workout</span>
        <button onclick="closeWorkoutModal()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1">×</button>
      </div>

      <div style="display:grid;grid-template-columns:auto 1fr;align-items:center;gap:10px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Date</div>
        <input id="wm-date" type="date" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;color-scheme:dark">
      </div>

      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Type</div>
      <div id="wm-type-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px"></div>

      <div id="wm-ex-sec" style="display:none">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Exercises <span style="font-size:10px;color:var(--text4)">(toggle off)</span></div>
        <div id="wm-ex-pills" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px"></div>
        <div style="display:flex;gap:5px;margin-bottom:12px">
          <input id="wm-ex-add" type="text" placeholder="Add exercise..." onkeydown="if(event.key==='Enter'){wmAddCustomEx();event.preventDefault();}"
            style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none">
          <button onclick="wmAddCustomEx()" style="padding:5px 12px;border-radius:var(--r-sm);background:var(--bg4);border:1px solid var(--border);color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer">+ Add</button>
        </div>
      </div>

      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Durée</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">
        ${['30 min','45 min','60 min','75 min','90 min'].map(d=>
          `<button class="wm-dur-pill" data-dur="${d}" onclick="wmPickDur('${d}')"
            style="padding:4px 10px;border-radius:16px;font-size:11px;font-family:var(--font);cursor:pointer;background:var(--bg4);border:1px solid var(--border);color:var(--text3);transition:all .12s">${d}</button>`).join('')}
      </div>
      <input id="wm-dur-custom" type="text" placeholder="Custom (ex: 1h20)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 12px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;margin-bottom:10px">

      <input id="wm-notes" type="text" placeholder="Notes: PR, ressenti... (optionnel)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 12px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;margin-bottom:14px">

      <button onclick="saveWorkout()" class="btn btn-primary" style="width:100%;padding:11px;font-size:14px">Save Workout</button>
    </div>
  </div>

  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">This Month</div>
      <div class="metric-val">${sessions} sessions</div>
    </div>
    <div class="metric">
      <div class="metric-label">Current Streak</div>
      <div class="metric-val" style="color:var(--yellow)">${streak} days</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total Logged</div>
      <div class="metric-val">${logs.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Avg / week</div>
      <div class="metric-val">${logs.length>0?(sessions/4.3).toFixed(1):0}</div>
    </div>
  </div>
  <div class="g2 mb16">
    <div class="card">
      <div class="sec-hdr"><span class="sec-title">30-Day Activity</span></div>
      <div class="hm-labels">${dayLabels}</div>
      <div class="heatmap">${heatmap}</div>
    </div>
    <div class="card">
      <div class="sec-hdr">
        <span class="sec-title">Workouts</span>
        <button class="btn btn-primary btn-sm" onclick="openWorkoutModal()"><svg data-feather="plus"></svg> Log workout</button>
      </div>
      <div class="txn-list">${logRows}</div>
    </div>
  </div>`;
}

function editEatingGoal(field, label){
  const goals = getEatingGoals();
  const cur = goals[field] || (field==='cal'?2400:140);
  const val = prompt(`${label}:`, cur);
  if(val===null) return;
  const n = parseInt(val);
  if(!isNaN(n) && n>0){ goals[field]=n; saveEatingGoals(goals); navigate('eating'); }
}

function pgEating(){
  const meals  = getMeals();
  const today  = new Date().toISOString().slice(0,10);
  const todayM = meals.filter(m=>m.date===today);
  const totalCal = todayM.reduce((s,m)=>s+m.cal,0);
  const totalPro = todayM.reduce((s,m)=>s+m.protein,0);

  const goals = getEatingGoals();
  const goalCal = goals.cal || 2400;
  const goalPro = goals.protein || 140;
  const calPct  = Math.min(100, Math.round(totalCal/goalCal*100));
  const proPct  = Math.min(100, Math.round(totalPro/goalPro*100));
  const calColor = calPct>=100?'var(--green)':calPct>=75?'var(--yellow)':'var(--accent)';
  const proColor = proPct>=100?'var(--green)':proPct>=75?'var(--yellow)':'var(--accent)';

  // dining/grocery from real txns
  const txns = applyOverrides(applyRules(D.txns));
  const now  = new Date();
  let diningSpend=0, grocerySpend=0;
  txns.forEach(t=>{
    const raw=t.date_iso||t.date||'';
    let d;
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){const[y,m,day]=raw.split('-').map(Number);d=new Date(y,m-1,day);}else{d=new Date(raw);}
    if(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()) return;
    if(t.cat==='Food/Dining') diningSpend+=Math.abs(t.amt);
    if(t.cat==='Groceries') grocerySpend+=Math.abs(t.amt);
  });

  const rows = todayM.map(m=>`
    <div class="meal-row">
      <div class="meal-ico">${ico(m.ico,16)}</div>

        <div style="font-size:13px;font-weight:500;color:var(--text)">${m.meal}</div>

        <button onclick="deleteMeal('${m.id}')" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:15px" title="Delete">×</button>

function toggleHabitDay(id){
  const today = new Date().toISOString().slice(0,10);
  const habits = getHabits();
  const h = habits.find(x=>x.id===id);
  if(!h) return;
  const idx = h.log.indexOf(today);

  else h.log.push(today);

  navigate('habits');
}

function pgHabits(){
  const habits = getHabits();
  const today  = new Date().toISOString().slice(0,10);

  // calc streak for a habit
  function calcStreak(log){
    let s=0;
    for(let i=0;i<60;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      if(log.includes(d.toISOString().slice(0,10))) s++;
      else break;
    }
    return s;
  }

  // overall 30-day rate
  const last30 = Array.from({length:30},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); });
  const totalPossible = habits.length * 30;
  const totalDone = habits.reduce((s,h)=>s+last30.filter(d=>h.log.includes(d)).length,0);
  const overallRate = totalPossible>0?Math.round(totalDone/totalPossible*100):0;

  const cards = habits.map(h=>{
    const streak = calcStreak(h.log);
    const doneToday = h.log.includes(today);
    const dots = last30.reverse().map(d=>`<div class="dot ${h.log.includes(d)?'done':'miss'}"></div>`).join('');
    last30.reverse(); // restore order
    const rate = Math.round(last30.filter(d=>h.log.includes(d)).length/30*100);
    return`<div class="habit-card">
      <div class="habit-hdr">
        <span class="habit-name">${h.name}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="habit-streak">${ico('zap',12)} ${streak}d</span>
          <button onclick="deleteHabit('${h.id}')" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;line-height:1" title="Delete">×</button>
        </div>
      </div>
      <div class="habit-dots">${dots}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span class="habit-stat">${rate}% this month</span>
        <button onclick="toggleHabitDay('${h.id}')" class="btn btn-sm ${doneToday?'btn-primary':'btn-ghost'}" style="font-size:11px;padding:4px 10px">
          ${doneToday?'<svg data-feather="check" style="width:12px;height:12px;vertical-align:middle"></svg> Done':'Mark done'}
        </button>
      </div>
    </div>`;
  }).join('') || '<div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--text3);font-size:13px">No habits yet. Add your first habit above.</div>';

  return`
  <!-- Habit modal -->
  <div id="habit-modal" style="display:none;opacity:0;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;transition:opacity .15s">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:360px;max-width:95vw">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <span style="font-size:14px;font-weight:600;color:var(--text)">Add Habit</span>
        <button onclick="closeHabitModal()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px">×</button>
      </div>
      <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Habit Name</label>
      <input id="hm-name" type="text" placeholder="e.g. Morning workout" onkeydown="if(event.key==='Enter')saveHabit()"
        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin-bottom:14px">
      <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Frequency</label>
      <select id="hm-freq" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none">
        <option value="daily">Daily</option>
        <option value="weekdays">Weekdays only</option>
        <option value="weekly">Weekly</option>
      </select>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button onclick="closeHabitModal()" class="btn btn-ghost">Cancel</button>
        <button onclick="saveHabit()" class="btn btn-primary">Add Habit</button>
      </div>
    </div>
  </div>

  <div class="metrics-row mb20">
    <div class="metric">
      <div class="metric-label">Overall Rate</div>
      <div class="metric-val">${overallRate}%</div>
      <div class="metric-delta up">Last 30 days</div>
    </div>
    <div class="metric">
      <div class="metric-label">Active Habits</div>
      <div class="metric-val">${habits.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Done Today</div>
      <div class="metric-val" style="color:var(--green)">${habits.filter(h=>h.log.includes(today)).length} / ${habits.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Best Streak</div>
      <div class="metric-val" style="color:var(--yellow)">${habits.length?Math.max(...habits.map(h=>calcStreak(h.log))):0}d</div>
    </div>
  </div>
  <div class="sec-hdr mb14">
    <span class="sec-title">Daily Habits</span>
    <button class="btn btn-primary btn-sm" onclick="openHabitModal()"><svg data-feather="plus"></svg> Add habit</button>
  </div>
  <div class="g2">${cards}</div>`;
}

function _calBuildEvents(year, month){
  const events = {}; // day -> [{type, label, color, sub}]
  const add = (day, type, label, color, sub='') => {
    if(!events[day]) events[day]=[];
    events[day].push({type, label, color, sub});
  };
  // Transactions
  applyOverrides(applyRules(D.txns)).forEach(t=>{
    const raw = t.date_iso||t.date||'';
    // handle "Jun 04" format (no year) — assume current year
    let d;
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) d=new Date(raw+'T00:00');
    else d=new Date(raw+' '+year);
    if(isNaN(d)||d.getMonth()!==month||d.getFullYear()!==year) return;
    const day=d.getDate();
    if(t.amt<0) add(day,'txn','trending-down',t.name.slice(0,18),'var(--red)', (Math.abs(t.amt)).toFixed(0)+'$');
    else        add(day,'income','dollar-sign',t.name.slice(0,18),'var(--green)', '+'+t.amt.toFixed(0)+'$');
  });
  // Gym
  getGymLogs().forEach(l=>{
    const d=new Date(l.date+'T00:00');
    if(d.getMonth()!==month||d.getFullYear()!==year) return;
    add(d.getDate(),'gym','zap',l.workout,'var(--accent)', l.duration||'');
  });
  // Meals (summarize per day: X meals, Y kcal)
  const mealsByDay={};
  getMeals().forEach(m=>{
    const d=new Date(m.date+'T00:00');
    if(d.getMonth()!==month||d.getFullYear()!==year) return;
    const day=d.getDate();
    if(!mealsByDay[day]) mealsByDay[day]={count:0,cal:0,protein:0,items:[]};
    mealsByDay[day].count++; mealsByDay[day].cal+=m.cal; mealsByDay[day].protein+=m.protein;
    mealsByDay[day].items.push(m);
  });
  Object.entries(mealsByDay).forEach(([day,ms])=>{
    add(+day,'meal','coffee',ms.count+' meal'+(ms.count>1?'s':''),'var(--yellow)', ms.cal+'kcal · '+ms.protein+'g prot');
  });
  // Habits — check each habit's log array for this month's dates
  getHabits().forEach(h=>{
    (h.log||[]).forEach(iso=>{
      const d=new Date(iso+'T00:00');
      if(d.getMonth()!==month||d.getFullYear()!==year) return;
      add(d.getDate(),'habit','check-circle',h.name,'var(--green2,#4ade80)','');
    });
  });
  // Custom events (birthdays, rdv, events, reminders, travel)
  getCalEvents().forEach(e=>{
    const tpl = CAL_EV_TYPES[e.type]||CAL_EV_TYPES.event;
    // parse date
    const d = new Date(e.date+'T00:00');
    // yearly repeat for birthdays
    const matches = e.repeat==='yearly'
      ? (d.getMonth()===month)
      : (d.getMonth()===month && d.getFullYear()===year);
    if(!matches) return;
    add(d.getDate(), 'custom_'+e.type, tpl.icon||'calendar', e.title, tpl.color, e.notes||'');
  });
  return events;
}

function _calBuildDayPanel(day, year, month){
  if(!day) return '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Click a day to see details</div>';
  const allEvs = _calBuildEvents(year, month)[day]||[];
  // exclude raw txns — show gym, meals, habits, custom only
  const evs = allEvs.filter(e=>e.type!=='txn'&&e.type!=='income');
  const isoDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const txnCount = allEvs.filter(e=>e.type==='txn'||e.type==='income').length;

  const isoPrefix = isoDate;
  const customEvMap = {};
  getCalEvents().forEach(e=>{ if(e.date===isoPrefix || (e.repeat==='yearly' && e.date.slice(5)===isoPrefix.slice(5))) customEvMap[e.title]=e.id; });

  const TYPE_ICO = {txn:'trending-down',income:'dollar-sign',gym:'zap',meal:'coffee',habit:'check-circle'};
  const rows = evs.map(e=>{
    const evIco = e.type.startsWith('custom_') ? ico((CAL_EV_TYPES[e.type.replace('custom_','')]||CAL_EV_TYPES.event).icon||'calendar',12) : ico(TYPE_ICO[e.type]||'folder',12);
    const evLabel = e.label;
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2)">
      <div style="width:3px;min-height:32px;border-radius:2px;background:${e.color};flex-shrink:0;margin-top:2px"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12.5px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-flex;align-items:center;gap:4px">${evIco} ${evLabel}</div>
        ${e.sub?`<div style="font-size:11px;color:var(--text3);margin-top:1px">${e.sub}</div>`:''}
      </div>
      ${e.type.startsWith('custom_')&&customEvMap[e.label]?
        `<button onclick="deleteCalEv('${customEvMap[e.label]}')" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0">×</button>`:''}
    </div>`;
  }).join('');

  const empty = !evs.length ? `<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:12px">Nothing logged on ${day} ${new Date(year,month,day).toLocaleString('en',{month:'short'})}</div>` : '';

  const txnBtn = txnCount>0 ? `
    <button onclick="goToTxnDate('${isoDate}')"
      style="width:100%;margin-top:10px;padding:8px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-family:var(--font);font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between">
      <span style="display:inline-flex;align-items:center;gap:4px"><svg data-feather="trending-down" style="width:14px;height:14px"></svg> Transactions le ${day} ${new Date(year,month,day).toLocaleString('en',{month:'short'})}</span>
      <span style="color:var(--text3)">${txnCount} →</span>
    </button>` : '';

  return rows + empty + txnBtn;
}

function _calWeekEvents(weekStart){
  // Build events for all 7 days of the week, returns array of 7 {date, events[]}
  const result = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  for(let i=0;i<7;i++){
    const d = new Date(weekStart);
    d.setDate(d.getDate()+i);
    const y=d.getFullYear(), m=d.getMonth(), day=d.getDate();
    const isToday = d.getTime()===today.getTime();
    const evs = _calBuildEvents(y,m)[day]||[];
    result.push({date:d, year:y, month:m, day, isToday, events:evs});
  }
  return result;
}

function _calEvTimePosition(ev){
  // Return {top:px, height:px} for an event block
  // Default hour assignments based on type
  const HOUR_PX = 48; // 48px per hour
  const types = {
    gym:     {hour:7,  dur:1},
    meal:    {hour:12, dur:1},
    habit:   {hour:8,  dur:1},
    txn:     {hour:10, dur:0.5},
    income:  {hour:10, dur:0.5},
  };
  let hour=9, dur=1; // default for custom events
  if(types[ev.type]){
    hour=types[ev.type].hour;
    dur=types[ev.type].dur;
  }
  return {top: (hour-6)*HOUR_PX, height: dur*HOUR_PX};
}
