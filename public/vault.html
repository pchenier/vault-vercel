      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:15px;font-weight:700;color:var(--text)">Add Event</span>
        <button onclick="closeCalEvModal()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1">×</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        ${Object.entries(CAL_EV_TYPES).map(([k,t])=>
          `<button class="cev-type-pill" data-type="${k}" onclick="cevPickType('${k}')"
            style="padding:5px 12px;border-radius:16px;font-size:12px;font-family:var(--font);cursor:pointer;transition:all .12s;background:${k==='event'?'var(--text)':'var(--bg4)'};border:1px solid ${k==='event'?'var(--text)':'var(--border)'};color:${k==='event'?'var(--bg)':'var(--text3)'}">
            ${ico(t.icon,14)} ${t.label}</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Titre</div>
          <input id="cev-title" type="text" placeholder="ex: Fete de Marie..." style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Date</div>
          <input id="cev-date" type="date" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;color-scheme:dark">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Notes</div>
          <input id="cev-notes" type="text" placeholder="Optionnel..." style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Recurrence</div>
          <select id="cev-repeat" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none">
            <option value="none">Once</option>
            <option value="yearly">Every year</option>
            <option value="monthly">Every month</option>
          </select>
        </div>
      </div>
      <button onclick="saveCalEv()" class="btn btn-primary" style="width:100%;padding:11px;font-size:14px">Save</button>
    </div>
  </div>`;

  // ════════════════════════════ WEEK VIEW ════════════════════════════
  if(_calView==='week'){
    const weekDays = _calWeekEvents(_calWeekStart);
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const ws = _calWeekStart;
    const we = new Date(ws); we.setDate(we.getDate()+6);
    const rangeLabel = ws.toLocaleDateString('en',{month:'long',day:'numeric'}) + ' - ' +
      (ws.getMonth()!==we.getMonth() ? we.toLocaleDateString('en',{month:'long',day:'numeric'}) : we.getDate().toString()) + ', ' + we.getFullYear();
    const addDay = todayDate.getDate();

    // Column headers
    const colHeaders = weekDays.map((di,i)=>{
      const dName = dayNames[i];
      const dNum = di.day;
      const todayCls = di.isToday ? ' today-col' : '';
      const numCls = di.isToday ? ' is-today' : '';
      return `<div class="cal-day-hdr-cell${todayCls}" style="grid-column:${i+2}">
        <span>${dName}</span>
        <span class="cal-date-num${numCls}">${dNum}</span>
      </div>`;
    }).join('');

    // Time rows
    const HOUR_PX = 48;
    let timeRows = '';
    for(let h=6;h<=23;h++){
      const label = h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';
      timeRows += `<div class="cal-time-col" style="grid-column:1">${label}</div>`;
      weekDays.forEach((di,i)=>{
        const todayCls = di.isToday ? ' today-col' : '';
        timeRows += `<div class="cal-day-col${todayCls}" style="grid-column:${i+2}"><div class="cal-time-line"><div class="cal-time-line-30"></div></div></div>`;
      });
    }

    // Event blocks per day
    let eventBlocks = '';
    weekDays.forEach((di,i)=>{
      const col = i + 2;
      di.events.forEach(ev=>{
        const _wkIco = {txn:'trending-down',income:'dollar-sign',gym:'zap',meal:'coffee',habit:'check-circle'};
        const evIco = ev.type.startsWith('custom_') ? ((CAL_EV_TYPES[ev.type.replace('custom_','')]||CAL_EV_TYPES.event).icon||'calendar') : (_wkIco[ev.type]||'folder');
        const cleanLabel = ev.label;
        eventBlocks += `<div class="cal-ev-block" style="grid-column:${col};top:${pos.top+40}px;height:${pos.height-2}px;background:${ev.color}22;color:${ev.color};border-left:3px solid ${ev.color}" title="${cleanLabel}${ev.sub?' - '+ev.sub:''}">${ico(evIco,10)} ${cleanLabel.slice(0,20)}</div>`;
      });
    });

    // Now line
    let nowLine = '';
    const nowMins = today.getHours()*60 + today.getMinutes();
    if(nowMins >= 6*60 && nowMins <= 24*60){
      const nowTop = ((nowMins/60)-6)*HOUR_PX + 40;
      nowLine = `<div class="cal-now-line" style="top:${nowTop}px;grid-column:1/-1"></div>`;
    }

    const scrollScript = `<script>
      (function(){
        var g=document.getElementById('cal-week-scroll');
        if(g){
          var nowMins=${today.getHours()}*60+${today.getMinutes()};
          var scrollTo=((nowMins/60)-6-2)*${HOUR_PX};
          if(scrollTo>0) g.scrollTop=scrollTo;
        }
      })();
    <\/script>`;

    return modal + `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 16px 0;position:sticky;top:0;z-index:4;background:var(--bg2)">
        <div class="sec-hdr mb12">
          <div style="display:flex;align-items:center;gap:10px">
            <button onclick="calWeekNav(-1)" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 10px;font-family:var(--font)">${ico('chevron-left',14)}</button>
            <span class="sec-title">${rangeLabel}</span>
            <button onclick="calWeekNav(1)" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 10px;font-family:var(--font)">${ico('chevron-right',14)}</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="_calWeekStart=(function(){const n=new Date();const d=n.getDay();const diff=d===0?6:d-1;const m=new Date(n);m.setDate(n.getDate()-diff);m.setHours(0,0,0,0);return m;})();navigate('calendar')" class="btn btn-ghost btn-sm">Today</button>
            <button onclick="openCalEvModal(${addDay})" class="btn btn-primary btn-sm">${ico('plus',12)} Add</button>
            ${viewPills}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:56px repeat(7,1fr)">${colHeaders}</div>
      </div>
      <div id="cal-week-scroll" style="overflow-y:auto;max-height:calc(100vh - 200px)">
        <div style="display:grid;grid-template-columns:56px repeat(7,1fr);position:relative">
          ${timeRows}
          ${eventBlocks}
          ${nowLine}
        </div>
      </div>
    </div>
    ${scrollScript}`;
  }

  // ════════════════════════════ DAY VIEW ════════════════════════════
  if(_calView==='day'){
    const dayDate = new Date(_calDayDate);
    const y=dayDate.getFullYear(), m=dayDate.getMonth(), d=dayDate.getDate();
    const dayName = dayDate.toLocaleDateString('en',{weekday:'long'});
    const dateLabel = dayDate.toLocaleDateString('en',{month:'long',day:'numeric',year:'numeric'});
    const dayEvs = _calBuildEvents(y,m)[d]||[];
    const isToday = dayDate.getTime()===todayDate.getTime();

    const HOUR_PX = 48;
    let timeRows = '';
    for(let h=6;h<=23;h++){
      const label = h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';
      timeRows += `<div class="cal-time-col" style="grid-column:1">${label}</div>`;
      timeRows += `<div class="cal-day-col${isToday?' today-col':''}" style="grid-column:2"><div class="cal-time-line"><div class="cal-time-line-30"></div></div></div>`;
    }

    let eventBlocks = '';
    dayEvs.forEach(ev=>{
      const pos = _calEvTimePosition(ev);
      const _dyIco = {txn:'trending-down',income:'dollar-sign',gym:'zap',meal:'coffee',habit:'check-circle'};
      const evIco = ev.type.startsWith('custom_') ? ((CAL_EV_TYPES[ev.type.replace('custom_','')]||CAL_EV_TYPES.event).icon||'calendar') : (_dyIco[ev.type]||'folder');
      const cleanLabel = ev.label;
      eventBlocks += `<div class="cal-ev-block" style="grid-column:2;top:${pos.top+40}px;height:${pos.height-2}px;background:${ev.color}22;color:${ev.color};border-left:3px solid ${ev.color}" title="${cleanLabel}${ev.sub?' - '+ev.sub:''}">${ico(evIco,10)} ${cleanLabel.slice(0,30)}</div>`;
    });

    let nowLine = '';
    const nowMins = today.getHours()*60 + today.getMinutes();
    if(nowMins >= 6*60 && nowMins <= 24*60){
      const nowTop = ((nowMins/60)-6)*HOUR_PX + 40;
      nowLine = `<div class="cal-now-line" style="top:${nowTop}px;grid-column:1/-1"></div>`;
    }

    const scrollScript = `<script>
      (function(){
        var g=document.getElementById('cal-day-scroll');
        if(g){
          var nowMins=${today.getHours()}*60+${today.getMinutes()};
          var scrollTo=((nowMins/60)-6-2)*${HOUR_PX};
          if(scrollTo>0) g.scrollTop=scrollTo;
        }
      })();
    <\/script>`;

    // Column header for day view
    const colHeader = `<div class="cal-day-hdr-cell${isToday?' today-col':''}" style="grid-column:2">
      <span>${dayName.slice(0,3)}</span>
      <span class="cal-date-num${isToday?' is-today':''}">${d}</span>
    </div>`;

    return modal + `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 16px 0;position:sticky;top:0;z-index:4;background:var(--bg2)">
        <div class="sec-hdr mb12">
          <div style="display:flex;align-items:center;gap:10px">
            <button onclick="_calDayDate.setDate(_calDayDate.getDate()-1);navigate('calendar')" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 10px;font-family:var(--font)">${ico('chevron-left',14)}</button>
            <span class="sec-title">${dateLabel}</span>
            <button onclick="_calDayDate.setDate(_calDayDate.getDate()+1);navigate('calendar')" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 10px;font-family:var(--font)">${ico('chevron-right',14)}</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="_calDayDate=new Date();_calDayDate.setHours(0,0,0,0);navigate('calendar')" class="btn btn-ghost btn-sm">Today</button>
            <button onclick="openCalEvModal(${d})" class="btn btn-primary btn-sm">${ico('plus',12)} Add</button>
            ${viewPills}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:56px 1fr">${colHeader}</div>
      </div>
      <div id="cal-day-scroll" style="overflow-y:auto;max-height:calc(100vh - 200px)">
        <div style="display:grid;grid-template-columns:56px 1fr;position:relative">
          ${timeRows}
          ${eventBlocks}
          ${nowLine}
        </div>
      </div>
    </div>
    ${scrollScript}`;
  }

  // ════════════════════════════ MONTH VIEW ════════════════════════════
  const year = _calYear, month = _calMonth;
  const monthName = new Date(year,month,1).toLocaleString('en',{month:'long'});
  const daysInMonth = new Date(year,month+1,0).getDate();
  const offset = (new Date(year,month,1).getDay()+6)%7;
  const isCurrentMonth = today.getFullYear()===year && today.getMonth()===month;
  const todayD = isCurrentMonth ? today.getDate() : -1;

  const events = _calBuildEvents(year, month);

  const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const headers=dayLabels.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('');
  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday = d===todayD;
    const isSelected = d===_calSelDay;
    const dayEvs = events[d]||[];

    const customEvs = dayEvs.filter(e=>e.type.startsWith('custom_'));
    const bgEvs     = dayEvs.filter(e=>!e.type.startsWith('custom_'));

    const chips = customEvs.slice(0,2).map(e=>{
      const tpl = CAL_EV_TYPES[e.type.replace('custom_','')]||CAL_EV_TYPES.event;
      return `<span class="cal-ev-chip" style="background:${e.color}22;color:${e.color};border:1px solid ${e.color}55">${ico(tpl.icon||'calendar',10)} ${e.label.slice(0,13)}</span>`;
    }).join('');

    const typesSeen=new Set();
    const dots = bgEvs.filter(e=>{ if(typesSeen.has(e.type)) return false; typesSeen.add(e.type); return true; })
      .slice(0,4).map(e=>`<div style="width:4px;height:4px;border-radius:50%;background:${e.color};flex-shrink:0"></div>`).join('');

    cells+=`<div class="cal-cell ${isToday?'today':''}" data-day="${d}"
      onclick="calSelectDay(${d})"
      style="cursor:pointer;outline:${isSelected?'2px solid var(--accent)':'none'};z-index:${isSelected?1:0}">
      <span style="font-size:10px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--text)':'var(--text3)'};line-height:1;margin-bottom:2px">${d}</span>
      ${chips}
      ${dots?`<div class="cal-dot-row">${dots}</div>`:''}
    </div>`;
  }

  // Upcoming — custom events only (next 30 days)
  const upcoming=[];
  for(let i=0;i<=30;i++){
    const dd=new Date(today); dd.setDate(dd.getDate()+i);
    const mo=dd.getMonth(), yr=dd.getFullYear(), dy=dd.getDate();
    const evs=(_calBuildEvents(yr,mo)[dy]||[]).filter(e=>e.type.startsWith('custom_'));
    evs.forEach(e=>upcoming.push({...e, date:dd.toLocaleDateString('en',{month:'short',day:'numeric'}), iso:dd.toISOString().slice(0,10)}));
  }

  return modal + `
  <div style="display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start">
    <div class="card">
      <div class="sec-hdr mb12">
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="calNav(-1)" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 10px;font-family:var(--font)">${ico('chevron-left',14)}</button>
          <span class="sec-title">${monthName} ${year}</span>
          <button onclick="calNav(1)" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 10px;font-family:var(--font)">${ico('chevron-right',14)}</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="_calYear=new Date().getFullYear();_calMonth=new Date().getMonth();navigate('calendar')" class="btn btn-ghost btn-sm">Today</button>
          <button onclick="openCalEvModal(${todayD>0?todayD:1})" class="btn btn-primary btn-sm">${ico('plus',12)} Add</button>
          ${viewPills}
        </div>
      </div>
      <div class="cal-grid mb6">${headers}</div>
      <div class="cal-grid mb12">${cells}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></div><span style="font-size:10px;color:var(--text3)">Gym</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--yellow)"></div><span style="font-size:10px;color:var(--text3)">Meals</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:#4ade80"></div><span style="font-size:10px;color:var(--text3)">Habits</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--red)"></div><span style="font-size:10px;color:var(--text3)">Depenses</span></div>
        ${Object.entries(CAL_EV_TYPES).map(([,t])=>`
        <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:${t.color}"></div><span style="font-size:10px;color:var(--text3)">${ico(t.icon,12)} ${t.label}</span></div>`).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card">
        <div class="sec-hdr mb8">
          <span class="sec-title" id="cal-day-title">${_calSelDay ? _calSelDay+' '+monthName : 'Day Detail'}</span>
          <button id="cal-day-add" onclick="openCalEvModal(${_calSelDay||1})" class="btn btn-ghost btn-sm" style="font-size:10px;${_calSelDay?'':'display:none'}">${ico('plus',12)} Add</button>
        </div>
        <div id="cal-day-panel">${_calBuildDayPanel(_calSelDay, year, month)}</div>
      </div>
      <div class="card">
        <div class="sec-hdr mb8"><span class="sec-title">Upcoming</span></div>
        ${upcoming.length?upcoming.slice(0,15).map(e=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)">
            <div style="width:5px;height:5px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
            <div style="flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.label}</div>
            <div style="font-size:10px;color:var(--text3);flex-shrink:0">${e.date}</div>
          </div>`).join('')
        :'<div style="padding:12px 0;text-align:center;color:var(--text3);font-size:12px">Rien a venir</div>'}
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════ SETTINGS ═══════════════════════════
function pgSettings(){
  const section=(title,rows)=>`
    <div class="card mb14">
      <div class="sec-hdr mb12"><span class="sec-title">${title}</span></div>
      ${rows}
    </div>`;

  const row=(label,desc,ctrl)=>`
    <div class="setting-row">
      <div><div class="setting-label">${label}</div><div class="setting-desc">${desc}</div></div>
      ${ctrl}
    </div>`;

  const tog=(on=true)=>`<div class="toggle ${on?'on':''}" onclick="this.classList.toggle('on')"></div>`;

  const cn = D.connections || {};
  const badge = (on) => on ? '<span class="badge b-green">Connected</span>' : '<span class="badge b-gray" style="opacity:.6">Not connected</span>';
  const connRow = (name,desc,key,link) => row(name,desc,`<a href="${link}" style="text-decoration:none">${badge(cn[key])}</a>`);
  const userEmail = D.userEmail || '';
  const userName = D.userName || '';
  return`
  ${section('Profile',[
    row('Name','Your display name','<input style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;color:var(--text);font-family:var(--font);font-size:12.5px;outline:none;width:160px" value="'+userName+'">'),
    row('Email','Account email','<span style="font-size:12.5px;color:var(--text3)">'+(userEmail||'Not set')+'</span>'),
    row('Currency','Display currency','<span class="badge b-gray">CAD $</span>'),
  ].join(''))}
  ${section('Connections',[
    connRow('Plaid','Bank & credit card data','plaid','/setup'),
    connRow('Wise','International transfers','wise','/setup'),
    connRow('Crypto Wallets','Solana, Ethereum, Bitcoin wallets','crypto','javascript:void(0)'),
  ].join(''))}
  ${section('Notifications',[
    row('Budget alerts','Notify when over budget',tog(true)),
    row('Weekly summary','Weekly financial digest on Monday',tog(true)),
    row('Large transactions','Alert for transactions over $200',tog(false)),
    row('Bill reminders','Upcoming bills 3 days before',tog(true)),
  ].join(''))}
  ${section('Appearance',[
    row('Theme','Color scheme','<span class="badge b-gray">Dark</span>'),
    row('Compact mode','Reduce spacing for more content',tog(false)),
  ].join(''))}
  ${section('Data',[
    row('Export data','Download all your financial data','<button class="btn btn-ghost btn-sm"><svg data-feather="download"></svg> Export CSV</button>'),
    row('Sync now','Force refresh all accounts','<button class="btn btn-ghost btn-sm" onclick="doRefresh()"><svg data-feather="refresh-cw"></svg> Sync</button>'),
    row('Delete account','Permanently delete all data','<button class="btn btn-sm" style="background:var(--red-bg);color:var(--red);border:1px solid var(--red-br)">Delete</button>'),
    row('Replay onboarding','Walk through the intro tour again','<button class="btn btn-ghost btn-sm" onclick="localStorage.removeItem(ONBOARDED_KEY);location.reload()"><svg data-feather="play-circle"></svg> Replay</button>'),
    row('Sign out','Log out of your account','<button class="btn btn-ghost btn-sm" onclick="doLogout()"><svg data-feather="log-out" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></svg> Sign out</button>'),
  ].join(''))}`;
}

// ═══════════════════════════ LOGOUT ═══════════════════════════
function doLogout(){
  fetch('/api/auth/logout',{method:'POST',credentials:'include'}).then(()=>{
    window.location.href='/login';
  }).catch(()=>{
    window.location.href='/login';
  });
}

// ═══════════════════════════ REFRESH ═══════════════════════════
function doRefresh(){
  const btn=document.getElementById('refresh-btn');
  const dot=document.getElementById('sync-dot');
  if(btn) {
    btn.style.opacity='.4';
    btn.querySelector('svg').style.animation='spin 1s linear infinite';
  }
  if(dot) dot.style.background='var(--yellow)';
  fetch('/api/refresh',{method:'POST'})
    .then(r=>r.json())
    .then(()=>{
      pollRefresh();
    })
    .catch(()=>{
      if(btn) { btn.style.opacity=''; btn.querySelector('svg').style.animation=''; }
      if(dot) dot.style.background='var(--red)';
      showToast('Refresh failed', 'Could not reach server.', '#ef4444');
    });
}

function pollRefresh(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    if(d.status==='ready'){
      const btn=document.getElementById('refresh-btn');
      if(btn){ btn.style.opacity=''; btn.querySelector('svg').style.animation=''; }
      window.location.reload();
    } else if(d.status==='error'){
      const dot=document.getElementById('sync-dot');
      const btn=document.getElementById('refresh-btn');
      if(dot) dot.style.background='var(--red)';
      if(btn){ btn.style.opacity=''; btn.querySelector('svg').style.animation=''; }
      showToast('Sync error', 'Failed to refresh data.', '#ef4444');
    } else {
      const ts=document.getElementById('sync-ts');
      if(ts) ts.textContent=d.msg||'Syncing...';
      setTimeout(pollRefresh,1500);
    }
  }).catch(()=>setTimeout(pollRefresh,2000));
}

const NOTIF_KEY   = 'vault_notified';   // set of "eventId_YYYY-MM-DD" already fired
const REMIND_MINS = 15;                 // fire X minutes before the event

function getNotified() {
  try { return new Set(JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]')); }
  catch(e){ return new Set(); }
}
function saveNotified(s) {
  // keep only last 500 to avoid unbounded growth
  const arr = [...s].slice(-500);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(arr));
}

const EVENT_COLORS = {
  birthday: '#f472b6',
  event:    '#a3e635',
  rdv:      '#a78bfa',
  reminder: '#fbbf24',
  travel:   '#38bdf8'
};
const EVENT_LABELS = {
  birthday: 'Birthday',
  event:    'Event',
  rdv:      'Appointment',
  reminder: 'Reminder',
  travel:   'Travel'
};

function checkCalendarNotifications() {
  const events  = JSON.parse(localStorage.getItem('vault_events') || '[]');
  if (!events.length) return;

  const notified = getNotified();
  const now      = new Date();
  let   changed  = false;

  events.forEach(ev => {
    if (!ev.date) return;

    // Build all upcoming occurrences to check (today + next 7 days for recurring)
    const occurrences = [];
    const base = new Date(ev.date + 'T00:00:00');

    if (ev.recurrence === 'yearly') {
      // check this year and next year
      [now.getFullYear(), now.getFullYear()+1].forEach(yr => {
        const d = new Date(yr, base.getMonth(), base.getDate());
        occurrences.push(d);
      });
    } else if (ev.recurrence === 'monthly') {
      // check this month and next
      [0,1,2].forEach(offset => {
        const d = new Date(now.getFullYear(), now.getMonth()+offset, base.getDate());
        occurrences.push(d);
      });
    } else {
      occurrences.push(base);
    }

    occurrences.forEach(occ => {
      // Set event time to midnight of that day (full day events)
      const eventTime = new Date(occ);
      eventTime.setHours(0, 0, 0, 0);

      const msUntil   = eventTime - now;
      const minsUntil = msUntil / 60000;

      const dateStr  = eventTime.toISOString().slice(0,10);
      const fireKey  = `${ev.id||ev.title}_${dateStr}`;

      // Fire if within the reminder window and not already notified
      // Window: between REMIND_MINS and REMIND_MINS+2 (2 min grace for the interval)
      // OR same day (0 to REMIND_MINS)
      const sameDay = minsUntil >= 0 && minsUntil < 60*24;
      const inWindow = minsUntil >= 0 && minsUntil <= REMIND_MINS + 2;

      if (sameDay && !notified.has(fireKey)) {
        notified.add(fireKey);
        changed = true;

        const color = EVENT_COLORS[ev.type] || '#a3e635';
        const label = EVENT_LABELS[ev.type] || ev.type;
        const dayLabel = minsUntil < 1 ? "Today, now"
                       : minsUntil < 60 ? `In ${Math.round(minsUntil)} min`
                       : "Today";

        // Browser push notification
        if (Notification.permission === 'granted') {
          new Notification(`${label}: ${ev.title}`, {
            body: dayLabel,
            icon: '/favicon.ico',
            tag:  fireKey,
            silent: false
          });
        }

        // In-app toast
        showToast(`${label}: ${ev.title}`, dayLabel, color);
      }
    });
  });

  if (changed) saveNotified(notified);
}

async function initNotifications() {
  if (!('Notification' in window)) return;

  if (Notification.permission === 'default') {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      showToast('Notifications activées', 'Fiscit va te notifier pour tes événements.', '#a3e635');
    }
  }

  // Run immediately, then every 60 seconds
  checkCalendarNotifications();
  setInterval(checkCalendarNotifications, 60_000);
}

// ═══════════════════════════ PLAID LINK ═══════════════════════════
async function openPlaidLink() {
  try {
    // Get link token from backend
    const res = await fetch('/api/plaid/link_token', {method:'POST'});
    const data = await res.json();
    if (!data.ok) { alert('Plaid error: ' + data.error); return; }

    // Open Plaid Link
    const handler = Plaid.create({
      token: data.link_token,
      onSuccess: async (public_token, metadata) => {
        const r = await fetch('/api/plaid/exchange', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({public_token})
        });
        const d = await r.json();
        if (d.ok) {
          // Poll /api/status until ready then reload
          const pollStatus = async () => {
            try {
              const s = await fetch('/api/status');
              const sd = await s.json();
              if (sd.status === 'ready') {
                location.reload();
              } else {
                setTimeout(pollStatus, 1500);
              }
            } catch(e) { setTimeout(pollStatus, 2000); }
          };
          alert('Account connected! Loading your data...');
          setTimeout(pollStatus, 2000);
        } else {
          alert('Exchange error: ' + d.error);
        }
      },
      onExit: (err) => {
        if (err) console.error('Plaid Link exit:', err);
      }
    });
    handler.open();
  } catch(e) {
    alert('Failed to open Plaid Link: ' + e.message);
  }
}

    return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin:8px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px"><span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--bg2)">${ico(CONN_ICOS[key]||'link',14)}</span><span style="font-size:13px;font-weight:500;color:var(--text)">${name}</span></div>
        <span class="badge ${isOn?'b-green':'b-gray'}" style="${isOn?'':'opacity:.6'}">${isOn?'Connected':'Not connected'}</span>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${desc}</div>
      ${isOn?'':guideBox(guideSteps)}
      ${isOn?'':'<a href="/setup" style="display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 16px;font-size:12.5px;color:var(--text);text-decoration:none;font-weight:500">Go to Setup</a>'}
    </div>`;
  };

  const catGrid = Object.keys(CAT_ICOS).map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border2)"><span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--bg3)">${ico(CAT_ICOS[c]||'folder',14)}</span><span style="font-size:13px;color:var(--text)">${c}</span></div>`).join('');

  function render(){
    const s = STEPS[step];
    iconEl.innerHTML = '';
    bodyEl.innerHTML = '';
    backBtn.style.display = step > 0 ? 'inline-block' : 'none';

    if(s.id==='welcome'){
      iconEl.innerHTML = ico('home',28);
      titleEl.textContent = 'Welcome to Fiscit';
      subEl.textContent = 'Your finances, finally clear.';
      bodyEl.innerHTML = '<p style="color:var(--text3);font-size:13px;text-align:center">Track spending, budgets, investments, and more, all in one place. Let\'s get you set up in under a minute.</p>';
      nextBtn.textContent = 'Let\'s go';
      skipBtn.style.display = '';
    }
    else if(s.id==='profile'){
      iconEl.innerHTML = ico('user',28);
      titleEl.textContent = 'Tell us about yourself';
      subEl.textContent = 'This will be your display name in Fiscit.';
      const n = D.userName||'';
      const e = D.userEmail||'';
      bodyEl.innerHTML = `<div style="margin-bottom:14px"><label style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Name</label><input id="ob-name" value="${n}" placeholder="Your name" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none"></div><div><label style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Email</label><input id="ob-email" value="${e}" placeholder="you@email.com" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none"></div>`;
      nextBtn.textContent = 'Next';
      skipBtn.style.display = '';
    }
    else if(s.id==='bank'){
      iconEl.innerHTML = ico('credit-card',28);
      titleEl.textContent = 'Connect your bank';
      subEl.textContent = 'Plaid syncs your accounts automatically.';
      const isOn = D.connections && D.connections.plaid;
      bodyEl.innerHTML = isOn
        ? '<p style="color:var(--green);font-size:13px;text-align:center;padding:12px">Your bank is already connected via Plaid.</p>'
        : connCard('Plaid','Bank accounts, credit cards, and transactions.', 'plaid', ['Click "Go to Setup" below','Enter your Plaid API credentials','Select your bank and log in','Your transactions will sync automatically']);
      nextBtn.textContent = 'Next';
      skipBtn.style.display = '';
    }
    else if(s.id==='crypto'){
      iconEl.innerHTML = ico('bitcoin',28);
      titleEl.textContent = 'Track your crypto';
      subEl.textContent = 'Add wallet addresses to track balances.';
      const wallets = D.wallets || [];
      const isOn = wallets.length > 0;
      bodyEl.innerHTML = isOn
        ? `<p style="color:var(--green);font-size:13px;text-align:center;padding:12px">${wallets.length} wallet${wallets.length>1?'s':''} connected.</p>`
          + wallets.map(w=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2)"><span class="badge b-gray" style="font-size:10px">${w.chain}</span><span style="font-size:12px;color:var(--text2)">${w.address.slice(0,8)}...${w.address.slice(-6)}</span>${w.label?`<span style="font-size:11px;color:var(--text4)">(${w.label})</span>`:''}</div>`).join('')
        : connCard('Crypto Wallets','Solana, Ethereum, Bitcoin wallet addresses.', 'crypto', ['Open Settings and go to Setup','Add your wallet address for any chain','Balances sync automatically on refresh']);
      bodyEl.innerHTML += `<p style="font-size:12px;color:var(--text4);margin-top:12px;text-align:center">Supports Solana, Ethereum, and Bitcoin wallets.</p>`;
      nextBtn.textContent = 'Next';
      skipBtn.style.display = '';
    }
    else if(s.id==='other'){
      iconEl.innerHTML = ico('globe',28);
      titleEl.textContent = 'Other connections';
      subEl.textContent = 'International and investment accounts.';
      bodyEl.innerHTML = connCard('Wise','Multi-currency international transfers.', 'wise', ['Go to Setup page','Enter your Wise API token and profile ID','Balances sync automatically']);
      nextBtn.textContent = 'Next';
      skipBtn.style.display = '';
    }
    else if(s.id==='done'){
      iconEl.innerHTML = ico('check-circle',28);
      titleEl.textContent = 'You\'re all set!';
      subEl.textContent = 'Fiscit is ready to go.';
      bodyEl.innerHTML = `<p style="color:var(--text3);font-size:13px;text-align:center;margin-bottom:14px">Here are the categories Fiscit tracks for you:</p><div style="max-height:180px;overflow-y:auto;scrollbar-width:thin">${catGrid}</div><p style="color:var(--text4);font-size:12px;margin-top:14px;text-align:center">You can always add more connections later in Settings.</p>`;
      nextBtn.textContent = 'Start Fiscit';
      skipBtn.style.display = 'none';
    }

    dots.innerHTML = STEPS.map((_,i)=>`<div style="width:${i===step?'16px':'6px'};height:6px;border-radius:3px;background:${i===step?'var(--green)':'var(--bg3)'};transition:width .2s"></div>`).join('');
  }

  function saveProfile(){
    const nameInput = document.getElementById('ob-name');
    const emailInput = document.getElementById('ob-email');
    if(nameInput){
      D.userName = nameInput.value;
      localStorage.setItem('vault_userName', D.userName);
    }
    if(emailInput){
      D.userEmail = emailInput.value;
      localStorage.setItem('vault_userEmail', D.userEmail);
    }
  }

  function finish(){
    localStorage.setItem(ONBOARDED_KEY,'1');
    const o = document.getElementById('onboard-overlay');
    if(o){ o.style.opacity='0'; o.style.transition='opacity .2s'; setTimeout(()=>o.remove(),200); }
    navigate('dashboard');
    initNotifications();
    updateBudgetBadge();
    updateHeaderClock();
    setInterval(updateHeaderClock,30000);
    document.addEventListener('click',closeNotifDropdown);
    loadRealData();
  }

  nextBtn.onclick = ()=>{
    const cur = STEPS[step];
    if(cur.id==='profile') saveProfile();
    if(step < STEPS.length - 1){ step++; render(); } else { finish(); }
  };
  backBtn.onclick = ()=>{ if(step > 0){ step--; render(); } };
  skipBtn.onclick = ()=>{
    const cur = STEPS[step];
    if(cur.id==='profile') saveProfile();
    finish();
  };
  overlay.addEventListener('keydown',e=>{ if(e.key==='Enter') nextBtn.click(); if(e.key==='Escape') skipBtn.click(); });
  render();
  nextBtn.focus();
}

function loadRealData(){
  // Restore profile from localStorage (saved during onboarding)
  const lsName = localStorage.getItem('vault_userName');
  const lsEmail = localStorage.getItem('vault_userEmail');
  if(lsName && !D.userName) D.userName = lsName;
  if(lsEmail && !D.userEmail) D.userEmail = lsEmail;

  fetch('/api/data',{credentials:'include'}).then(r=>{
    if(r.status===401){window.location.href='/login';return null;}
    return r.json();
  }).then(d=>{
    if(!d)return;
    Object.keys(d).forEach(k=>{if(d[k]!==undefined)D[k]=d[k];});
    // Preserve localStorage profile if server doesn't have it yet
    if(lsName && !D.userName) D.userName = lsName;
    if(lsEmail && !D.userEmail) D.userEmail = lsEmail;
    const un=document.getElementById('user-name');
    const ue=document.getElementById('user-email');
    const av=document.getElementById('user-avatar');
    const displayName = D.userName || D.userEmail?.split('@')[0] || 'User';
    const displayEmail = D.userEmail || '';
    if(un) un.textContent = displayName;
    if(ue) ue.textContent = displayEmail;
    if(av) av.textContent = displayName.slice(0,2).toUpperCase();
    navigate('dashboard');
    updateBudgetBadge();
    feather.replace({width:14,height:14});
  }).catch(()=>{});
}

// ═══════════════════════════ INIT ═══════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  feather.replace({width:14,height:14});
  // Check auth + load data, then show onboarding or dashboard
  fetch('/api/data',{credentials:'include'}).then(r=>{
    if(r.status===401){window.location.href='/login';return null;}
    if(!r.ok) return null; // 404 etc — use defaults
    return r.json();
  }).then(d=>{
    if(d){
      // Merge API data into D
      Object.keys(d).forEach(k=>{if(d[k]!==undefined)D[k]=d[k];});
      // Update sidebar user info
      const displayName = D.userName || D.userEmail?.split('@')[0] || 'User';
      const displayEmail = D.userEmail || '';
      const un=document.getElementById('user-name');
      const ue=document.getElementById('user-email');
      const av=document.getElementById('user-avatar');
      if(un) un.textContent = displayName;
      if(ue) ue.textContent = displayEmail;
      if(av) av.textContent = displayName.slice(0,2).toUpperCase();
      // Update sync timestamp
      if(D.generated){
        const ts=document.getElementById('sync-ts');
        if(ts) ts.textContent=D.generated;
      }
    }
    // Show onboarding or dashboard
    const hasAccounts = d && (d.accounts && d.accounts.length > 0);
    if(!localStorage.getItem(ONBOARDED_KEY) || !hasAccounts){
      showOnboarding();
    } else {
      navigate('dashboard');
      initNotifications();
      updateBudgetBadge();
      updateHeaderClock();
      setInterval(updateHeaderClock,30000);
      document.addEventListener('click',closeNotifDropdown);
      feather.replace({width:14,height:14});
    }
  }).catch(()=>{
    // Network error — still show something
    if(!localStorage.getItem(ONBOARDED_KEY)){
      showOnboarding();
    } else {
      navigate('dashboard');
      updateBudgetBadge();
      updateHeaderClock();
      setInterval(updateHeaderClock,30000);
    }
  });
});
</script>
</body>
</html>
