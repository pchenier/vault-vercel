<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fiscit Logo: Stylized F with vault/safe element -->
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0A0F1A"/>
  
  <!-- Inner ring (vault door feel) -->
  <circle cx="256" cy="256" r="200" stroke="#60A5FA" stroke-width="3" fill="none" opacity="0.3"/>
  
  <!-- The F letter - bold, modern, geometric -->
  <!-- Vertical bar -->
  <rect x="160" y="120" width="52" height="272" rx="8" fill="#F0F4F8"/>
  
  <!-- Top horizontal bar -->
  <rect x="160" y="120" width="180" height="52" rx="8" fill="#F0F4F8"/>
  
  <!-- Middle horizontal bar (slightly shorter) -->
  <rect x="160" y="230" width="140" height="44" rx="8" fill="#F0F4F8"/>
  
  <!-- Accent: blue dot/circle on top-right (the "it" - action point) -->
  <circle cx="352" cy="146" r="28" fill="#60A5FA"/>
  
  <!-- Subtle vault lines on the vertical bar -->
  <line x1="176" y1="200" x2="196" y2="200" stroke="#0A0F1A" stroke-width="2" opacity="0.15"/>
  <line x1="176" y1="220" x2="196" y2="220" stroke="#0A0F1A" stroke-width="2" opacity="0.15"/>
  <line x1="176" y1="300" x2="196" y2="300" stroke="#0A0F1A" stroke-width="2" opacity="0.15"/>
  <line x1="176" y1="320" x2="196" y2="320" stroke="#0A0F1A" stroke-width="2" opacity="0.15"/>
  <line x1="176" y1="340" x2="196" y2="340" stroke="#0A0F1A" stroke-width="2" opacity="0.15"/>
  <line x1="176" y1="360" x2="196" y2="360" stroke="#0A0F1A" stroke-width="2" opacity="0.15"/>
</svg>